<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Painel Administrador RF - Relatórios</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="core/supabase.js"></script>

<style>

/* BASE */
body{
  font-family:system-ui;
  margin:0;
  background:#0f172a;
  color:#e5e7eb;
}

/* HEADER */
.header{
  padding:15px;
  background:#1e293b;
  text-align:center;
  font-weight:700;
  border-bottom:1px solid #334155;
}

/* CONTAINER */
.container{
  padding:15px;
  max-width:700px;
  margin:auto;
}

/* CARD */
.card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
  border:1px solid #334155;
}

/* TOP */
.top{
  display:flex;
  justify-content:space-between;
  font-weight:700;
}

/* TEXTO */
.small{
  font-size:13px;
  color:#94a3b8;
}

/* STATUS */
.good{ color:#22c55e; }
.bad{ color:#ef4444; }

</style>

</head>

<body>

<div class="header">
📊 Painel Administrador RF
</div>

<div class="container">

<h2>Relatório por Grupo</h2>

<div id="lista"></div>

</div>

<script>

if(localStorage.getItem("admin_logado") !== "true"){
  window.location.href = "login.html";
}
  
async function carregar(){

  const lista = document.getElementById("lista");

  lista.innerHTML = "Carregando...";

  // BUSCAR CORRIDAS
  const { data: corridas, error } = await supabase
    .from("corridas")
    .select("*");

  if(error){
    lista.innerHTML = "Erro ao carregar dados";
    return;
  }

  const grupos = {};

  corridas.forEach(c => {

    const grupo = c.grupo || "Sem grupo";

    if(!grupos[grupo]){
      grupos[grupo] = {
        nome: grupo,
        total: 0,
        faturamento: 0,
        canceladas: 0
      };
    }

    grupos[grupo].total++;

    if(c.status === "finalizada"){
      grupos[grupo].faturamento += Number(c.valor);
    } else {
      grupos[grupo].canceladas++;
    }

  });

  const arr = Object.values(grupos)
    .sort((a,b) => b.faturamento - a.faturamento);

  lista.innerHTML = "";

  arr.forEach(g => {

    const taxa = g.total
      ? ((g.canceladas / g.total) * 100)
      : 0;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="top">
        <span>${g.nome}</span>
        <span>${g.total} corridas</span>
      </div>

      <div class="small">💰 R$ ${g.faturamento.toFixed(2)}</div>

      <div class="small">❌ Canceladas: ${g.canceladas}</div>

      <div class="small ${taxa > 30 ? "bad" : "good"}">
        Taxa de cancelamento: ${taxa.toFixed(1)}%
      </div>
    `;

    lista.appendChild(div);

  });

}

carregar();

</script>

</body>
</html>
