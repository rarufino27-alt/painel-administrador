<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Relatórios RF</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="core/datamanager.js"></script>

<style>
body{
  font-family:system-ui;
  margin:0;
  background:#111;
  color:#fff;
}

.container{
  padding:15px;
}

h1{
  text-align:center;
}

/* CARD */
.card{
  background:#1c1c1c;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

.top{
  display:flex;
  justify-content:space-between;
  font-weight:bold;
}

.small{
  font-size:13px;
  opacity:0.7;
}

.good{ color:#22c55e; }
.bad{ color:#ef4444; }
</style>

</head>

<body>

<div class="container">

<h1>📊 Relatório por Grupo</h1>

<div id="lista"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="core/supabase.js"></script>
  
<script>

function carregar(){

  const data = DataManager.get();

  const grupos = {};

  data.corridas.forEach(c => {

    if(!grupos[c.grupo]){
      grupos[c.grupo] = {
        nome: c.grupo,
        total: 0,
        faturamento: 0,
        canceladas: 0
      };
    }

    grupos[c.grupo].total++;

    if(c.status === "finalizada"){
      grupos[c.grupo].faturamento += c.valor;
    } else {
      grupos[c.grupo].canceladas++;
    }

  });

  // TRANSFORMAR EM ARRAY
  const arr = Object.values(grupos)
    .sort((a,b) => b.faturamento - a.faturamento);

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  arr.forEach(g => {

    const taxa = g.total
      ? ((g.canceladas / g.total) * 100)
      : 0;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="top">
        <span>${g.nome}</span>
        <span>${g.total} corridas</span>
      </div>

      <div class="small">
        💰 R$ ${g.faturamento.toFixed(2)}
      </div>

      <div class="small">
        ❌ Canceladas: ${g.canceladas}
      </div>

      <div class="small ${taxa > 30 ? "bad" : "good"}">
        Taxa cancelamento: ${taxa.toFixed(1)}%
      </div>
    `;

    lista.appendChild(div);

  });

}

carregar();

</script>

</body>
</html>
