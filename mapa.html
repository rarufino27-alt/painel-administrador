<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>RF Passageiro - Mapa</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

html, body{
margin:0;
padding:0;
height:100%;
font-family:Arial, sans-serif;
}

#map{
height:100%;
width:100%;
}

/* BOTÃO LOCALIZAÇÃO */

.loc-btn{
position:absolute;
bottom:120px;
right:20px;
background:white;
border-radius:50px;
padding:12px 16px;
font-weight:600;
border:none;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
cursor:pointer;
z-index:10;
}

/* CARD INFERIOR */

.bottom-card{
position:absolute;
bottom:0;
width:100%;
background:white;
border-radius:20px 20px 0 0;
padding:20px;
box-shadow:0 -5px 20px rgba(0,0,0,0.3);
}

.bottom-card h2{
margin:0;
font-size:18px;
}

.bottom-card p{
margin:6px 0 0;
color:#666;
font-size:14px;
}

</style>
</head>

<body>

<div id="map"></div>

<button class="loc-btn" onclick="localizarUsuario()">
📍 Minha localização
</button>

<div class="bottom-card">
<h2>RF Mobilidade</h2>
<p>Encontre motoristas próximos</p>
</div>

<script>

let map;
let marcadorUsuario;

/* INICIAR MAPA */

function initMap(){

const centro = {
lat: -8.283,
lng: -35.032
};

map = new google.maps.Map(document.getElementById("map"),{
zoom:14,
center:centro,
mapTypeControl:false,
streetViewControl:false,
fullscreenControl:false
});

}

/* LOCALIZAR USUÁRIO */

function localizarUsuario(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(pos=>{

const posicao={
lat:pos.coords.latitude,
lng:pos.coords.longitude
};

map.setCenter(posicao);

if(marcadorUsuario){
marcadorUsuario.setMap(null);
}

marcadorUsuario = new google.maps.Marker({
position:posicao,
map:map,
title:"Você está aqui",
animation:google.maps.Animation.DROP
});

});

}else{

alert("Geolocalização não suportada.");

}

}

/* SIMULAR MOTORISTAS (TESTE) */

function motoristasFake(){

const motoristas=[
{lat:-8.282, lng:-35.030},
{lat:-8.284, lng:-35.034},
{lat:-8.280, lng:-35.028}
];

motoristas.forEach(m=>{

new google.maps.Marker({
position:m,
map:map,
icon:{
url:"https://maps.google.com/mapfiles/kml/shapes/cabs.png",
scaledSize:new google.maps.Size(40,40)
}
});

});

}

window.initMap=initMap;

</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA1cAOVDUPslp3eRQilh41tte_jqqzeY00&callback=initMap" async defer></script>

</body>
</html>
