<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>RF Mobilidade</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

html,body{
margin:0;
padding:0;
height:100%;
font-family:Arial, sans-serif;
}

#map{
height:100%;
width:100%;
}

.loc-btn{
position:absolute;
bottom:140px;
right:20px;
background:white;
border-radius:50px;
padding:12px 16px;
border:none;
font-weight:bold;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
cursor:pointer;
z-index:10;
}

.bottom-card{
position:absolute;
bottom:0;
width:100%;
background:white;
border-radius:20px 20px 0 0;
padding:20px;
box-shadow:0 -5px 20px rgba(0,0,0,0.25);
}

.bottom-card h2{
margin:0;
font-size:18px;
}

.bottom-card p{
margin:5px 0 0;
color:#666;
font-size:14px;
}

</style>
</head>

<body>

<div id="map"></div>

<button class="loc-btn" onclick="centralizarUsuario()">
📍 Minha localização
</button>

<div class="bottom-card">
<h2>RF Mobilidade</h2>
<p>Motoristas próximos a você</p>
</div>

<script>

let map
let marcadorUsuario
let motoristas=[]

function initMap(){

const centro={lat:-8.283,lng:-35.032}

map=new google.maps.Map(document.getElementById("map"),{
zoom:14,
center:centro,
mapTypeControl:false,
streetViewControl:false,
fullscreenControl:false
})

localizarUsuario()
simularMotoristas()

}

/* LOCALIZAÇÃO PASSAGEIRO */

function localizarUsuario(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(pos=>{

const posicao={
lat:pos.coords.latitude,
lng:pos.coords.longitude
}

map.setCenter(posicao)

marcadorUsuario=new google.maps.Marker({
position:posicao,
map:map,
title:"Você",
icon:{
url:"https://maps.google.com/mapfiles/ms/icons/blue-dot.png"
}
})

})

}

}

function centralizarUsuario(){

if(marcadorUsuario){
map.setCenter(marcadorUsuario.getPosition())
}

}

/* MOTORISTAS SIMULADOS */

function simularMotoristas(){

const pontos=[
{lat:-8.284,lng:-35.030},
{lat:-8.282,lng:-35.034},
{lat:-8.280,lng:-35.028},
{lat:-8.286,lng:-35.033}
]

pontos.forEach(p=>{

const m=new google.maps.Marker({
position:p,
map:map,
icon:{
url:"https://maps.google.com/mapfiles/kml/shapes/cabs.png",
scaledSize:new google.maps.Size(40,40)
}
})

motoristas.push(m)

})

}

window.initMap=initMap

</script>

<script src="https://maps.googleapis.com/maps/api/js?key=SUA_CHAVE_AQUI&callback=initMap" async defer></script>

</body>
</html>
