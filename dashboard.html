<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Painel Administrador RF</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="core/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
  font-family:system-ui;
  margin:0;
  background:#0f172a;
  color:#e5e7eb;
}

.header{
  padding:15px;
  background:#1e293b;
  border-bottom:1px solid #334155;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.titulo{
  font-weight:700;
  font-size:18px;
}

.usuario{
  font-size:14px;
  color:#94a3b8;
}

.container{
  padding:15px;
  max-width:900px;
  margin:auto;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  text-align:center;
  border:1px solid #334155;
}

.card.full{
  grid-column:1 / -1;
}

.valor{
  font-size:22px;
  font-weight:bold;
  margin-top:8px;
  color:#22c55e;
}

canvas{
  margin-top:10px;
}

.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:#fff;
  font-weight:600;
  margin-top:10px;
  cursor:pointer;
}

.logout{
  background:#ef4444;
}

</style>

</head>

<body>

<div class="header">
  <div class="top">
    <div class="titulo">📊 Painel RF</div>
    <div class="usuario" id="usuarioNome">Olá...</div>
  </div>
</div>

<div class="container">

<div class="grid">

<div class="card">
  <div>Total Corridas</div>
  <div class="valor" id="totalCorridas">0</div>
</div>

<div class="card">
  <div>Canceladas</div>
  <div class="valor" id="canceladas">0</div>
</div>

<div class="card">
  <div>Faturamento</div>
  <div class="valor" id="faturamento">R$ 0</div>
</div>

<div class="card">
  <div>Média</div>
  <div class="valor" id="media">R$ 0</div>
</div>

<div class="card full">
  <div>🏆 Top Motorista</div>
  <div class="valor" id="topMotorista">-</div>
</div>

<div class="card full">
  <div>📈 Corridas por Dia</div>
  <canvas id="graficoCorridas"></canvas>
</div>

</div>

<button class="btn" onclick="ir('cadastrar.html')">➕ Nova Corrida</button>
<button class="btn" onclick="ir('corridas.html')">📋 Corridas</button>
<button class="btn" onclick="ir('motoristas.html')">👤 Motoristas</button>
<button class="btn" onclick="ir('relatorios.html')">📊 Relatórios</button>
<button class="btn logout" onclick="logout()">Sair</button>

</div>

<script>

/* =========================
LOGIN
========================= */
if(localStorage.getItem("admin_logado") !== "true"){
  window.location.href = "login.html";
}

function logout(){
  localStorage.removeItem("admin_logado");
  window.location.href = "login.html";
}

/* =========================
NOME DO ADMIN (NOVO)
========================= */
async function carregarUsuario(){

  const { data: { user } } = await window.supabaseClient.auth.getUser();

  if(user){
    document.getElementById("usuarioNome").innerText =
      "Olá, " + (user.email || "Admin");
  }

}

/* =========================
DASHBOARD
========================= */
let chart;

async function carregar(){

  const { data: corridas } = await window.supabaseClient
    .from("corridas")
    .select("*");

  const { data: motoristas } = await window.supabaseClient
    .from("motoristas")
    .select("id, nome");

  const map = {};
  motoristas.forEach(m => map[m.id] = m.nome);

  let total = corridas.length;
  let faturamento = 0;
  let canceladas = 0;

  const ranking = {};
  const porDia = {};

  corridas.forEach(c => {

    const data = new Date(c.data).toLocaleDateString();

    if(!porDia[data]) porDia[data] = 0;

    if(c.status === "finalizada"){
      faturamento += Number(c.valor);
      porDia[data]++;
    }else{
      canceladas++;
    }

    if(!ranking[c.motorista_id]){
      ranking[c.motorista_id] = 0;
    }

    if(c.status === "finalizada"){
      ranking[c.motorista_id]++;
    }

  });

  let topNome = "-";
  let topQtd = 0;

  for(let id in ranking){
    if(ranking[id] > topQtd){
      topQtd = ranking[id];
      topNome = `${map[id] || "Desconhecido"} (${topQtd})`;
    }
  }

  const media = total ? faturamento / total : 0;

  document.getElementById("totalCorridas").innerText = total;
  document.getElementById("canceladas").innerText = canceladas;
  document.getElementById("faturamento").innerText = "R$ " + faturamento.toFixed(2);
  document.getElementById("media").innerText = "R$ " + media.toFixed(2);
  document.getElementById("topMotorista").innerText = topNome;

  /* ===== GRÁFICO ===== */

  const labels = Object.keys(porDia);
  const valores = Object.values(porDia);

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("graficoCorridas"), {
    type: "line",
    data: {
      labels: labels,
      datasets: [{
        label: "Corridas",
        data: valores
      }]
    }
  });

}

/* =========================
AUTO UPDATE
========================= */
setInterval(carregar, 5000);

/* =========================
NAVEGAÇÃO
========================= */
function ir(p){
  window.location.href = p;
}

/* START */
carregar();
carregarUsuario();

</script>

</body>
</html>
