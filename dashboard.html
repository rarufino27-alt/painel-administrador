<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Dashboard RF</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="core/supabase.js"></script>

<style>

body{
  margin:0;
  font-family:system-ui;
  background: radial-gradient(circle at top,#0b1220,#020617);
  color:#e5e7eb;
}

.header{
  padding:16px;
  text-align:center;
  font-weight:bold;
  font-size:18px;
  background:rgba(30,41,59,.8);
}

.container{
  padding:16px;
  max-width:900px;
  margin:auto;
}

/* CARDS */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.card{
  background:rgba(30,41,59,.6);
  border-radius:14px;
  padding:14px;
}

.titulo{
  font-size:12px;
  color:#94a3b8;
}

.valor{
  font-size:20px;
  font-weight:bold;
  color:#22c55e;
}

/* LISTAS */
.lista{
  margin-top:10px;
}

.item{
  display:flex;
  justify-content:space-between;
  padding:8px;
  border-bottom:1px solid rgba(255,255,255,.05);
}

</style>

</head>

<body>

<div class="header">📊 Dashboard RF</div>

<div class="container">

<!-- RESUMO -->
<div class="grid">
  <div class="card">
    <div class="titulo">Faturamento Total</div>
    <div class="valor" id="total">R$ 0</div>
  </div>

  <div class="card">
    <div class="titulo">Corridas</div>
    <div class="valor" id="qtd">0</div>
  </div>

  <div class="card">
    <div class="titulo">Hoje</div>
    <div class="valor" id="hoje">R$ 0</div>
  </div>

  <div class="card">
    <div class="titulo">Mês</div>
    <div class="valor" id="mes">R$ 0</div>
  </div>
</div>

<!-- POR GRUPO -->
<div class="card">
  <div class="titulo">Faturamento por Grupo</div>
  <div id="porGrupo" class="lista"></div>
</div>

<!-- POR MOTORISTA -->
<div class="card">
  <div class="titulo">Ranking Motoristas</div>
  <div id="porMotorista" class="lista"></div>
</div>

</div>

<script>

async function carregar(){

  const { data, error } = await window.supabaseClient
    .from("corridas")
    .select(`
      valor,
      data_viagem,
      grupos(nome),
      motoristas(nome)
    `)
    .eq("status","finalizada");

  if(error){
    console.log(error);
    alert("Erro ao carregar");
    return;
  }

  calcular(data);
}

/* PROCESSAMENTO */
function calcular(corridas){

  let total = 0;
  let hoje = 0;
  let mes = 0;

  let porGrupo = {};
  let porMotorista = {};

  const hojeStr = new Date().toISOString().split("T")[0];
  const mesAtual = hojeStr.slice(0,7);

  corridas.forEach(c => {

    const valor = Number(c.valor) || 0;
    total += valor;

    if(c.data_viagem === hojeStr){
      hoje += valor;
    }

    if(c.data_viagem?.startsWith(mesAtual)){
      mes += valor;
    }

    /* GRUPOS */
    const grupo = c.grupos?.nome || "Sem grupo";
    porGrupo[grupo] = (porGrupo[grupo] || 0) + valor;

    /* MOTORISTA */
    const motorista = c.motoristas?.nome || "Sem motorista";
    porMotorista[motorista] = (porMotorista[motorista] || 0) + valor;

  });

  /* UI */
  document.getElementById("total").innerText = format(total);
  document.getElementById("qtd").innerText = corridas.length;
  document.getElementById("hoje").innerText = format(hoje);
  document.getElementById("mes").innerText = format(mes);

  renderLista("porGrupo", porGrupo);
  renderLista("porMotorista", porMotorista, true);

}

/* RENDER LISTAS */
function renderLista(id, obj, ordenar=false){

  const el = document.getElementById(id);
  el.innerHTML = "";

  let entries = Object.entries(obj);

  if(ordenar){
    entries.sort((a,b)=>b[1]-a[1]);
  }

  entries.forEach(([nome, valor])=>{
    el.innerHTML += `
      <div class="item">
        <span>${nome}</span>
        <strong>${format(valor)}</strong>
      </div>
    `;
  });

}

/* FORMATAR */
function format(v){
  return "R$ " + v.toFixed(2);
}

/* AUTO REFRESH */
setInterval(carregar, 5000);

carregar();

</script>

</body>
</html>
