<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Cadastro Motorista RF</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="core/supabase.js"></script>

<style>

body{
  margin:0;
  font-family:system-ui;
  background:#020617;
  color:#fff;
}

.header{
  padding:15px;
  text-align:center;
  background:#0f172a;
  font-weight:700;
}

.container{
  padding:15px;
  max-width:600px;
  margin:auto;
}

.card{
  background:#0f172a;
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
  border:1px solid #1e293b;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #1e293b;
  background:#020617;
  color:#fff;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:#000;
  font-weight:bold;
}

.small{
  font-size:13px;
  color:#94a3b8;
}

</style>

</head>

<body>

<div class="header">🚗 Novo Motorista</div>

<div class="container">

<!-- FORM -->
<div class="card">

<input id="nome" placeholder="Nome">
<input id="telefone" placeholder="Telefone">
<input id="endereco" placeholder="Endereço">

<input id="marca" placeholder="Marca">
<input id="modelo" placeholder="Modelo">
<input id="cor" placeholder="Cor">
<input id="placa" placeholder="Placa">

<button onclick="salvar()">Salvar</button>

</div>

<!-- ÚLTIMO CADASTRO -->
<div id="ultimo"></div>

</div>

<script>

async function salvar(){

  const data = {
    nome: nome.value.trim(),
    telefone: telefone.value.trim(),
    endereco: endereco.value.trim(),
    marca: marca.value.trim(),
    modelo: modelo.value.trim(),
    cor: cor.value.trim(),
    placa: placa.value.trim()
  };

  if(!data.nome || !data.telefone){
    alert("Nome e telefone obrigatórios");
    return;
  }

  const { error } = await window.supabaseClient
    .from("motoristas")
    .insert([data]);

  if(error){
    console.log(error);
    alert("Erro ao salvar");
    return;
  }

  alert("Salvo com sucesso");

  limpar();
  carregarUltimo();
}

/* =========================
MOSTRAR ÚLTIMO CADASTRO
========================= */
async function carregarUltimo(){

  const { data } = await window.supabaseClient
    .from("motoristas")
    .select("*")
    .order("id", { ascending:false })
    .limit(1);

  if(!data || data.length === 0) return;

  const m = data[0];

  ultimo.innerHTML = `
    <div class="card">
      <strong>${m.nome}</strong>
      <div class="small">📞 ${m.telefone}</div>
      <div class="small">📍 ${m.endereco || "-"}</div>
      <div class="small">🚗 ${m.marca || ""} ${m.modelo || ""}</div>
      <div class="small">🎨 ${m.cor || "-"}</div>
      <div class="small">🔖 ${m.placa || "-"}</div>
    </div>
  `;
}

/* =========================
LIMPAR
========================= */
function limpar(){
  nome.value = "";
  telefone.value = "";
  endereco.value = "";
  marca.value = "";
  modelo.value = "";
  cor.value = "";
  placa.value = "";
}

/* START */
carregarUltimo();

</script>

</body>
</html>
