<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Nova Corrida</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="core/supabase.js"></script>
<script src="core/datamanager.js"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background: radial-gradient(circle at top,#0b1220,#020617);
  color:#e5e7eb;
  padding:16px;
}
.card{
  background:rgba(30,41,59,.6);
  border:1px solid rgba(255,255,255,.05);
  border-radius:16px;
  padding:14px;
  margin-bottom:12px;
}
input, select{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.08);
  background:#020617;
  color:#fff;
  margin-bottom:10px;
}
h2{
  text-align:center;
  margin-bottom:16px;
}
.valor{
  font-size:18px;
  color:#22c55e;
  font-weight:bold;
}
button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  font-weight:bold;
  font-size:16px;
  color:#000;
}
button:active{
  transform:scale(0.97);
}
</style>

</head>

<body>

<h2>🚗 Nova Corrida</h2>

<!-- GRUPO DINÂMICO -->
<div class="card">
<select id="grupo">
  <option value="">Carregando grupos...</option>
</select>
</div>

<!-- ROTA -->
<div class="card">

<select id="origem"></select>

<button onclick="ativarParada()">+ Adicionar parada</button>

<select id="parada" style="display:none"></select>

<select id="destino"></select>

</div>

<!-- VALORES -->
<div class="card">
<div>Base: R$ <span class="valor" id="valorBase">0.00</span></div>
<div>Noturno: R$ <span class="valor" id="noturno">0.00</span></div>
<div>Total: R$ <span class="valor" id="total">0.00</span></div>
</div>

<!-- TAXAS -->
<div class="card">
<input id="taxas" type="number" placeholder="Taxas adicionais">
</div>

<!-- DATA + HORA -->
<div class="card">
<input type="date" id="dataViagem">
<input type="time" id="horaViagem">
</div>

<!-- MOTORISTA -->
<div class="card">
<select id="motorista">
  <option value="">Selecione o motorista</option>
</select>
</div>

<!-- STATUS -->
<div class="card">
<select id="status">
  <option value="finalizada">Finalizada</option>
  <option value="cancelada">Cancelada</option>
  <option value="nao_atendida">Não atendida</option>
</select>
</div>

<button onclick="salvar()">Salvar Corrida</button>

<script>

let valorBase = 0;
let origemSelecionada = null;
let paradaSelecionada = null;

/* INIT */
async function iniciar(){
  await DataManager.carregar();
  popularOrigens();
  carregarMotoristas();
  carregarGrupos(); // 🔥 NOVO
}

/* 🔥 CARREGAR GRUPOS DO SUPABASE */
async function carregarGrupos(){

  const select = document.getElementById("grupo");

  const { data, error } = await window.supabaseClient
    .from("grupos")
    .select("id,nome")
    .eq("ativo", true)
    .order("nome");

  if(error){
    console.error(error);
    select.innerHTML = '<option>Erro ao carregar</option>';
    return;
  }

  select.innerHTML = '<option value="">Selecione o grupo</option>';

  data.forEach(g=>{
    select.innerHTML += `<option value="${g.id}">${g.nome}</option>`;
  });

}

/* ORIGENS */
function popularOrigens(){
  const origens = DataManager.listarOrigens();
  origem.innerHTML = '<option value="">Selecione origem</option>';
  origens.forEach(o=>{
    origem.innerHTML += `<option value="${o}">${o}</option>`;
  });
}

/* DESTINOS */
function atualizarDestinos(){
  origemSelecionada = origem.value;
  parada.style.display = "none";
  paradaSelecionada = null;

  const destinos = DataManager.listarDestinos(origemSelecionada);

  destino.innerHTML = '<option value="">Selecione destino</option>';
  destinos.forEach(d=>{
    destino.innerHTML += `<option value="${d}">${d}</option>`;
  });
}

/* PARADA */
function ativarParada(){
  if(!origemSelecionada) return alert("Selecione origem");

  parada.style.display = "block";

  const destinos = DataManager.listarDestinos(origemSelecionada);

  parada.innerHTML = '<option value="">Selecione parada</option>';
  destinos.forEach(d=>{
    parada.innerHTML += `<option value="${d}">${d}</option>`;
  });
}

parada.onchange = ()=>{
  paradaSelecionada = parada.value;

  const destinos = DataManager.listarDestinos(paradaSelecionada);

  destino.innerHTML = '<option value="">Selecione destino</option>';
  destinos.forEach(d=>{
    destino.innerHTML += `<option value="${d}">${d}</option>`;
  });
};

/* CALCULO */
function calcular(){

  if(!origem.value || !destino.value) return;

  let valor = 0;

  if(!paradaSelecionada){
    valor = DataManager.buscarValor(origem.value, destino.value);
  }else{
    valor =
      (DataManager.buscarValor(origem.value, paradaSelecionada) || 0) +
      (DataManager.buscarValor(paradaSelecionada, destino.value) || 0);
  }

  valorBase = valor || 0;

  valorBaseEl.innerText = valorBase.toFixed(2);

  calcularTotal();
}

/* NOTURNO */
function calcularNoturno(){

  const hora = horaViagem.value;
  if(!hora) return 0;

  const [h,m] = hora.split(":").map(Number);
  const minutos = h * 60 + m;

  const ehNoturno = (minutos >= 1350) || (minutos < 300);

  if(!ehNoturno) return 0;

  return valorBase <= 24.99 ? 5 : valorBase * 0.35;
}

/* TOTAL */
function calcularTotal(){

  const taxasVal = Number(taxas.value || 0);
  const noturnoVal = calcularNoturno();

  noturno.innerText = noturnoVal.toFixed(2);

  const total = valorBase + taxasVal + noturnoVal;

  totalEl.innerText = total.toFixed(2);
}

/* MOTORISTAS */
async function carregarMotoristas(){

  const { data } = await window.supabaseClient
    .from("motoristas")
    .select("id,nome")
    .order("nome");

  data.forEach(m=>{
    motorista.innerHTML += `<option value="${m.id}">${m.nome}</option>`;
  });
}

/* 🔥 SALVAR CORRIDA CORRETO */
async function salvar(){

  const grupo_id = document.getElementById("grupo").value;
  const motorista_id = document.getElementById("motorista").value;
  const origem = document.getElementById("origem").value;
  const destino = document.getElementById("destino").value;
  const data_viagem = document.getElementById("dataViagem").value;
  const hora_viagem = document.getElementById("horaViagem").value;
  const taxas = Number(document.getElementById("taxas").value || 0);

  // 🔥 FORÇA STATUS CORRETO
  let statusValor = document.getElementById("status");

  let status = "finalizada"; // default

  if(statusValor){
    status = String(statusValor.value || "finalizada")
      .toLowerCase()
      .trim();
  }

  const adicional_noturno = Number(document.getElementById("noturno").innerText || 0);
  const valor = Number(document.getElementById("total").innerText || 0);

  if(!data_viagem || !hora_viagem){
    alert("Preencha data e horário");
    return;
  }

  const corrida = {
    grupo_id: Number(grupo_id),
    motorista_id: motorista_id || null,
    origem,
    destino,
    valor,
    status, // 🔥 AGORA GARANTIDO
    data_viagem,
    hora_viagem,
    taxas,
    adicional_noturno,
    created_at: new Date().toISOString()
  };

  console.log("SALVANDO:", corrida); // 🔥 DEBUG

  const { error } = await window.supabaseClient
    .from("corridas")
    .insert([corrida]);

  if(error){
    console.log(error);
    alert("Erro ao salvar");
    return;
  }

  alert("Corrida salva com sucesso");
  location.reload();
}
/* EVENTOS */
origem.onchange = atualizarDestinos;
destino.onchange = calcular;
taxas.oninput = calcularTotal;
horaViagem.onchange = calcularTotal;

const valorBaseEl = document.getElementById("valorBase");
const totalEl = document.getElementById("total");

/* START */
iniciar();

</script>

</body>
</html>
