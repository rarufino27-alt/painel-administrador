<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Painel Administrador RF - Nova Corrida</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="core/supabase.js"></script>

<style>

/* BASE */
body{
  font-family:system-ui;
  margin:0;
  background:#0f172a;
  color:#e5e7eb;
}

/* HEADER */
.header{
  padding:15px;
  background:#1e293b;
  text-align:center;
  font-weight:700;
  font-size:18px;
  border-bottom:1px solid #334155;
}

/* CONTAINER */
.container{
  padding:20px;
  max-width:600px;
  margin:auto;
}

/* CARD */
.card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  border:1px solid #334155;
}

/* INPUTS */
input, select{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:8px;
  border:1px solid #334155;
  background:#0f172a;
  color:#fff;
}

/* BOTÃO */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:#fff;
  font-weight:700;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

</style>

</head>

<body>

<div class="header">
🚗 Painel Administrador RF
</div>

<div class="container">

<h2>Nova Corrida</h2>

<div class="card">

<input id="grupo" placeholder="Grupo">

<input id="origem" placeholder="Origem">
<input id="destino" placeholder="Destino">

<input id="valor" type="number" placeholder="Valor da viagem">

<!-- MOTORISTA AGORA É SELECT -->
<select id="motorista">
  <option value="">Carregando motoristas...</option>
</select>

<select id="status">
  <option value="finalizada">Finalizada</option>
  <option value="cancelada">Cancelada</option>
</select>

<input id="motivo" placeholder="Motivo (se cancelada)">

<button onclick="salvar()">Registrar Corrida</button>

</div>

</div>

<script>
  
if(localStorage.getItem("admin_logado") !== "true"){
  window.location.href = "login.html";
}
  
/* =========================
CARREGAR MOTORISTAS
========================= */
async function carregarMotoristas(){

  const { data, error } = await supabase
    .from("motoristas")
    .select("*");

  const select = document.getElementById("motorista");

  if(error){
    select.innerHTML = "<option>Erro ao carregar</option>";
    return;
  }

  select.innerHTML = "<option value=''>Selecione o motorista</option>";

  data.forEach(m => {
    select.innerHTML += `<option value="${m.id}">${m.nome}</option>`;
  });

}

/* =========================
SALVAR CORRIDA
========================= */
async function salvar(){

  if(!motorista.value){
    alert("Selecione um motorista");
    return;
  }

  const { error } = await supabase
    .from("corridas")
    .insert([{
      motorista_id: motorista.value,
      grupo: grupo.value,
      origem: origem.value,
      destino: destino.value,
      valor: Number(valor.value),
      status: status.value,
      motivo: motivo.value,
      data: new Date()
    }]);

  if(error){
    alert("Erro: " + error.message);
    return;
  }

  alert("Corrida registrada com sucesso!");

  location.reload();
}

/* INIT */
carregarMotoristas();

</script>

</body>
</html>
