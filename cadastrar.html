<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Nova Corrida RF</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="core/datamanager.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="core/supabase.js"></script>

<link rel="stylesheet" href="/icons/icon-192.png">

<style>

/* BASE */
body{
  margin:0;
  font-family:system-ui;
  background:#0f172a;
  color:#e5e7eb;
}

/* CONTAINER */
.app{
  max-width:500px;
  margin:auto;
  padding:16px;
  padding-bottom:90px;
}

/* CARD */
.card{
  background:#1e293b;
  border:1px solid #334155;
  border-radius:14px;
  padding:14px;
  margin-bottom:14px;
}

/* INPUT SELECT (MODAL BUTTON) */
.input{
  background:#020617;
  border:1px solid #334155;
  border-radius:12px;
  padding:14px;
  margin-bottom:10px;
  cursor:pointer;
  transition:.2s;
}

.input:hover{
  border-color:#3b82f6;
}

/* CORES */
.green{ border-left:4px solid #22c55e; }
.yellow{ border-left:4px solid #facc15; }
.red{ border-left:4px solid #ef4444; }

/* BOTÃO PARADA */
.add{
  text-align:center;
  font-size:13px;
  color:#facc15;
  margin:6px 0;
  cursor:pointer;
}

/* VALORES */
.valor{
  font-size:16px;
  margin:4px 0;
}

.total{
  font-size:22px;
  color:#22c55e;
  font-weight:bold;
}

/* SELECT PADRÃO */
select, input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #334155;
  background:#020617;
  color:#fff;
  margin-bottom:10px;
}

/* BOTÃO FIXO */
.footer{
  position:fixed;
  bottom:0;
  width:100%;
  max-width:500px;
  background:#020617;
  padding:10px;
  border-top:1px solid #334155;
}

.footer button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:12px;
  background:#22c55e;
  font-weight:bold;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.8);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-box{
  width:90%;
  max-width:400px;
  background:#020617;
  padding:16px;
  border-radius:12px;
}

.lista{
  max-height:300px;
  overflow:auto;
}

.lista div{
  padding:10px;
  border-bottom:1px solid #334155;
  cursor:pointer;
}

.lista div:hover{
  background:#1e293b;
}

</style>

</head>

<body>

<div class="app">

<!-- ROTA -->
<div class="card">

<div class="input green" id="origemBtn">
  <span id="origemTexto">Selecionar origem</span>
</div>

<div class="add" id="btnParada">+ Adicionar parada</div>

<div class="input yellow" id="paradaBtn" style="display:none">
  <span id="paradaTexto">Selecionar parada</span>
</div>

<div class="input red" id="destinoBtn">
  <span id="destinoTexto">Selecionar destino</span>
</div>

</div>

<!-- VALORES -->
<div class="card">
  <div class="valor">Base: R$ <span id="base">0.00</span></div>
  <div class="valor">Noturno: R$ <span id="noturno">0.00</span></div>
  <div class="total">Total: R$ <span id="total">0.00</span></div>
</div>

<div class="card">
  <label style="font-size:13px;opacity:.7">Taxas adicionais</label>
  <input type="number" id="taxas" placeholder="Ex: 5.00">
</div>

<!-- DATA -->
<div class="card">
  <input type="date" id="data">
  <input type="time" id="hora">
</div>

<!-- MOTORISTA -->
<div class="card">
  <select id="motorista">
    <option value="">Nenhum</option>
  </select>
</div>

<!-- STATUS -->
<div class="card">
  <select id="status">
    <option value="finalizada">Finalizada</option>
    <option value="cancelada">Cancelada</option>
    <option value="nao_atendida">Não atendida</option>
  </select>
</div>

</div>

<!-- BOTÃO -->
<div class="footer">
  <button onclick="salvar()">Salvar Corrida</button>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <input id="busca" placeholder="Buscar...">
    <div class="lista" id="lista"></div>
  </div>
</div>

<script>

let origem=null;
let destino=null;
let parada=null;
let modo=null;
let listaAtual=[];
let valorBase=0;

/* INIT */
(async()=>{
  await DataManager.carregar();
  carregarMotoristas();
})();

/* MODAL */
function abrir(tipo){

  modo=tipo;
  busca.value="";

  let dados=[];

  if(tipo==="origem") dados=DataManager.listarOrigens();

  if(tipo==="parada"){
    if(!origem) return alert("Selecione origem");
    dados=DataManager.listarDestinos(origem);
  }

  if(tipo==="destino"){
    if(!origem) return alert("Selecione origem");
    dados = parada
      ? DataManager.listarDestinos(parada)
      : DataManager.listarDestinos(origem);
  }

  listaAtual=dados;
  render(dados);
  modal.style.display="flex";
}

function render(arr){
  lista.innerHTML="";
  arr.forEach(item=>{
    const div=document.createElement("div");
    div.innerText=item;
    div.onclick=()=>{
      selecionar(item);
      modal.style.display="none";
    };
    lista.appendChild(div);
  });
}

/* BUSCA INTELIGENTE */
busca.oninput=()=>{
  const termo = busca.value
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"");

  render(listaAtual.filter(i =>
    i.toLowerCase()
     .normalize("NFD")
     .replace(/[\u0300-\u036f]/g,"")
     .includes(termo)
  ));
};

/* SELEÇÃO */
function selecionar(v){

  if(modo==="origem"){
    origem=v;
    parada=null;
    destino=null;
    origemTexto.innerText=v;
    destinoTexto.innerText="Selecionar destino";
    paradaBtn.style.display="none";
  }

  if(modo==="parada"){
    parada=v;
    paradaTexto.innerText=v;
  }

  if(modo==="destino"){
    destino=v;
    destinoTexto.innerText=v;
  }

  calcular();
}

/* EVENTOS */
origemBtn.onclick=()=>abrir("origem");
destinoBtn.onclick=()=>abrir("destino");
paradaBtn.onclick=()=>abrir("parada");

btnParada.onclick=()=>{
  if(!origem) return alert("Selecione origem");
  paradaBtn.style.display="block";
};

/* CALCULO */
function calcular(){

  if(!origem || !destino) return;

  let valor = !parada
    ? DataManager.buscarValor(origem,destino)
    : (DataManager.buscarValor(origem,parada)||0) +
      (DataManager.buscarValor(parada,destino)||0);

  valorBase = valor || 0;

  document.getElementById("base").innerText = valorBase.toFixed(2);

  calcularTotal();
}

function calcularTotal(){

  const hora = document.getElementById("hora").value;
  const taxasInput = Number(document.getElementById("taxas").value || 0);

  let noturno = 0;

  if(hora){
    const [h,m] = hora.split(":").map(Number);
    const min = h*60 + m;

    if(min >= 1350 || min < 300){
      noturno = valorBase <= 24.99 ? 5 : valorBase * 0.35;
    }
  }

  document.getElementById("noturno").innerText = noturno.toFixed(2);

  const total = valorBase + noturno + taxasInput;

  document.getElementById("total").innerText = total.toFixed(2);
}

document.getElementById("taxas").addEventListener("input", calcularTotal);
document.getElementById("hora").addEventListener("change", calcularTotal);

/* MOTORISTAS */
async function carregarMotoristas(){

  const { data } = await window.supabaseClient
    .from("motoristas")
    .select("id,nome");

  data.forEach(m=>{
    motorista.innerHTML += `<option value="${m.id}">${m.nome}</option>`;
  });
}

/* SALVAR */
async function salvar(){

const taxas = Number(document.getElementById("taxas").value || 0);

  const motoristaSelect = document.getElementById("motorista");
  const statusSelect = document.getElementById("status");
  const dataInput = document.getElementById("data");
  const horaInput = document.getElementById("hora");

  const motorista_id = motoristaSelect.value || null;

  let status = statusSelect.value;

  // 🔥 REGRA: sem motorista = não atendida
  if(!motorista_id){
    status = "nao_atendida";
  }

  if(!origem || !destino){
    alert("Selecione origem e destino");
    return;
  }

  if(!dataInput.value || !horaInput.value){
    alert("Preencha data e horário");
    return;
  }

  const corrida = {
    motorista_id,
    origem,
    destino,
    valor: Number(document.getElementById("total").innerText),
    status,
    data_viagem: dataInput.value,
    hora_viagem: horaInput.value,
    created_at: new Date().toISOString()
  };

  console.log("SALVANDO:", corrida);

  const { error } = await window.supabaseClient
    .from("corridas")
    .insert([corrida]);

  if(error){
    console.error(error);
    alert("Erro ao salvar");
    return;
  }

  alert("Corrida salva com sucesso");
  location.reload();
}

</script>

</body>
</html>
