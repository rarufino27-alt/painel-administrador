<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Nova Corrida</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="core/supabase.js"></script>
<script src="core/datamanager.js"></script>

<style>

/* BASE PREMIUM */
body{
  margin:0;
  font-family:system-ui;
  background: radial-gradient(circle at top,#0b1220,#020617);
  color:#e5e7eb;
  padding:16px;
}

/* CARD */
.card{
  background:rgba(30,41,59,.6);
  border:1px solid rgba(255,255,255,.05);
  border-radius:16px;
  padding:14px;
  margin-bottom:12px;
}

/* INPUT */
input, select{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.08);
  background:#020617;
  color:#fff;
  margin-bottom:10px;
}

/* TITULO */
h2{
  text-align:center;
  margin-bottom:16px;
}

/* VALORES */
.valor{
  font-size:18px;
  color:#22c55e;
  font-weight:bold;
}

/* BOTÃO */
button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  font-weight:bold;
  font-size:16px;
  color:#000;
}

button:active{
  transform:scale(0.97);
}

</style>

</head>

<body>

<h2>🚗 Nova Corrida</h2>

<!-- GRUPO -->
<div class="card">
<select id="grupo">
  <option value="RF Principal">Grupo 01</option>
  <option value="RF Principal">Grupo 02</option>
  <option value="RF Principal">Grupo 03</option>
  <option value="RF Principal">Grupo 04</option>
  <option value="RF Principal">Grupo 05</option>
  <option value="RF Principal">Grupo 06</option>
  <option value="RF Principal">Grupo 07</option>
  <option value="RF Principal">Grupo 08</option>
  <option value="RF Principal">Grupo 09</option>
  <option value="RF Principal">Grupo 10</option>
  <option value="RF Principal">Grupo 11</option>
  <option value="RF Principal">Grupo 12</option>
  <option value="RF Principal">Grupo 13</option>
  <option value="RF Principal">Grupo 14</option>
  <option value="RF Principal">Grupo 15</option>
  <option value="RF Principal">Grupo 16</option>
  <option value="RF Principal">Grupo 17</option>
  <option value="RF Principal">Grupo 18</option>
  <option value="RF Principal">Grupo 19</option>
  <option value="RF Principal">Grupo 20</option>
  <option value="RF Principal">Grupo 21</option>
  <option value="RF Principal">Grupo 22</option>
  <option value="RF Principal">Grupo 23</option>
  <option value="RF Principal">Grupo 24</option>
  <option value="RF Principal">Grupo 25</option>
  <option value="RF Principal">Grupo 26</option>
  <option value="RF Principal">Grupo 27</option>
  <option value="RF Principal">Grupo 28</option>
  <option value="RF Principal">Grupo 29</option>
  <option value="RF Principal">Grupo 30</option>
</select>
</div>

<!-- ROTA -->
<div class="card">

<select id="origem"></select>

<button onclick="ativarParada()">+ Adicionar parada</button>

<select id="parada" style="display:none"></select>

<select id="destino"></select>

</div>

<!-- VALORES -->
<div class="card">
<div>Base: R$ <span class="valor" id="valorBase">0.00</span></div>
<div>Noturno: R$ <span class="valor" id="noturno">0.00</span></div>
<div>Total: R$ <span class="valor" id="total">0.00</span></div>
</div>

<!-- TAXAS -->
<div class="card">
<input id="taxas" type="number" placeholder="Taxas adicionais">
</div>

<!-- DATA + HORA -->
<div class="card">
<input type="date" id="dataViagem">
<input type="time" id="horaViagem">
</div>

<!-- MOTORISTA -->
<div class="card">
<select id="motorista">
  <option value="">Selecione o motorista</option>
</select>
</div>

<!-- STATUS -->
<div class="card">
<select id="status">
  <option value="finalizada">Finalizada</option>
  <option value="cancelada">Cancelada</option>
  <option value="nao_atendida">Não atendida</option>
</select>
</div>

<button onclick="salvar()">Salvar Corrida</button>

<script>

let valorBase = 0;
let origemSelecionada = null;
let paradaSelecionada = null;

/* INIT */
async function iniciar(){
  await DataManager.carregar();
  popularOrigens();
  carregarMotoristas();
}

/* ORIGENS */
function popularOrigens(){
  const origens = DataManager.listarOrigens();
  origem.innerHTML = '<option value="">Selecione origem</option>';

  origens.forEach(o=>{
    origem.innerHTML += `<option value="${o}">${o}</option>`;
  });
}

/* DESTINOS */
function atualizarDestinos(){
  origemSelecionada = origem.value;

  parada.style.display = "none";
  paradaSelecionada = null;

  const destinos = DataManager.listarDestinos(origemSelecionada);

  destino.innerHTML = '<option value="">Selecione destino</option>';

  destinos.forEach(d=>{
    destino.innerHTML += `<option value="${d}">${d}</option>`;
  });
}

/* PARADA */
function ativarParada(){
  if(!origemSelecionada) return alert("Selecione origem");

  parada.style.display = "block";

  const destinos = DataManager.listarDestinos(origemSelecionada);

  parada.innerHTML = '<option value="">Selecione parada</option>';

  destinos.forEach(d=>{
    parada.innerHTML += `<option value="${d}">${d}</option>`;
  });
}

parada.onchange = ()=>{
  paradaSelecionada = parada.value;

  const destinos = DataManager.listarDestinos(paradaSelecionada);

  destino.innerHTML = '<option value="">Selecione destino</option>';

  destinos.forEach(d=>{
    destino.innerHTML += `<option value="${d}">${d}</option>`;
  });
};

/* CALCULAR BASE */
function calcular(){

  if(!origem.value || !destino.value) return;

  let valor = 0;

  if(!paradaSelecionada){
    valor = DataManager.buscarValor(origem.value, destino.value);
  }else{
    valor =
      (DataManager.buscarValor(origem.value, paradaSelecionada) || 0) +
      (DataManager.buscarValor(paradaSelecionada, destino.value) || 0);
  }

  valorBase = valor || 0;

  valorBaseEl.innerText = valorBase.toFixed(2);

  calcularTotal();
}

/* NOTURNO AUTOMÁTICO */
function calcularNoturno(){

  const hora = document.getElementById("horaViagem").value;

  if(!hora) return 0;

  const [h,m] = hora.split(":").map(Number);
  const minutos = h * 60 + m;

  const ehNoturno =
    (minutos >= 1350) || // 22:30+
    (minutos < 300);     // até 05:00

  if(!ehNoturno) return 0;

  if(valorBase <= 24.99){
    return 5;
  }else{
    return valorBase * 0.35;
  }

}

/* TOTAL */
function calcularTotal(){

  const taxasVal = Number(taxas.value || 0);
  const noturnoVal = calcularNoturno();

  noturno.innerText = noturnoVal.toFixed(2);

  const total = valorBase + taxasVal + noturnoVal;

  totalEl.innerText = total.toFixed(2);

}

/* MOTORISTAS */
async function carregarMotoristas(){

  const { data } = await window.supabaseClient
    .from("motoristas")
    .select("id,nome")
    .order("nome");

  data.forEach(m=>{
    motorista.innerHTML += `<option value="${m.id}">${m.nome}</option>`;
  });

}

/* SALVAR */
async function salvar(){

  if(!dataViagem.value || !horaViagem.value){
    alert("Preencha data e horário");
    return;
  }

  const corrida = {
    grupo: grupo.value,
    motorista_id: motorista.value || null,
    origem: origem.value,
    destino: destino.value,
    valor: Number(totalEl.innerText),
    status: status.value,
    data_viagem: dataViagem.value,
    hora_viagem: horaViagem.value,
    taxas: Number(taxas.value || 0),
    adicional_noturno: Number(noturno.innerText),
    data: new Date().toISOString()
  };

  const { error } = await window.supabaseClient
    .from("corridas")
    .insert([corrida]);

  if(error){
    console.log(error);
    alert("Erro ao salvar");
    return;
  }

  alert("Corrida salva com sucesso");
  location.reload();

}

/* EVENTOS */
origem.onchange = atualizarDestinos;
destino.onchange = calcular;
taxas.oninput = calcularTotal;
horaViagem.onchange = calcularTotal;

const valorBaseEl = document.getElementById("valorBase");
const totalEl = document.getElementById("total");

/* START */
iniciar();

</script>

</body>
</html>
