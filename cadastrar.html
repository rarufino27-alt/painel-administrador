<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Nova Corrida RF</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="core/datamanager.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="core/supabase.js"></script>

<link rel="stylesheet" href="theme/theme.css">
<link rel="stylesheet" href="theme/layout.css">
<link rel="stylesheet" href="theme/components.css">

<style>

body{
  background:#0f172a;
  color:#e5e7eb;
}

.card-modern{
  background:#1e293b;
  border:1px solid #334155;
  border-radius:14px;
  padding:14px;
  margin-bottom:12px;
}

.input-box{
  padding:14px;
  border-radius:10px;
  margin-bottom:8px;
  background:#020617;
  border:1px solid #334155;
  cursor:pointer;
}

.input-box.green{ border-left:4px solid #22c55e; }
.input-box.yellow{ border-left:4px solid #facc15; }
.input-box.red{ border-left:4px solid #ef4444; }

.cta-box{
  position:fixed;
  bottom:0;
  width:100%;
  padding:10px;
  background:#020617;
  border-top:1px solid #334155;
}

.cta-box button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:12px;
  background:#22c55e;
  font-weight:bold;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.8);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-content{
  width:90%;
  max-width:400px;
  background:#020617;
  padding:16px;
  border-radius:12px;
}

.lista div{
  padding:10px;
  border-bottom:1px solid #334155;
  cursor:pointer;
}

</style>

</head>

<body>

<div class="app-container">

<div class="card-modern">

<div class="input-box green" id="origemBtn">
  <div id="origemTexto">Selecionar origem</div>
</div>

<div class="input-box yellow" id="paradaBtn" style="display:none">
  <div id="paradaTexto">Selecionar parada</div>
</div>

<div class="input-box red" id="destinoBtn">
  <div id="destinoTexto">Selecionar destino</div>
</div>

</div>

<div class="card-modern">
  <div>Base: R$ <span id="valorBase">0.00</span></div>
  <div>Noturno: R$ <span id="noturno">0.00</span></div>
  <div>Total: R$ <span id="total">0.00</span></div>
</div>

<div class="card-modern">
  <input type="date" id="dataViagem">
  <input type="time" id="horaViagem">
</div>

<div class="card-modern">
  <select id="motorista"></select>
</div>

<div class="card-modern">
  <select id="status">
    <option value="finalizada">Finalizada</option>
    <option value="cancelada">Cancelada</option>
    <option value="nao_atendida">Não atendida</option>
  </select>
</div>

</div>

<div class="cta-box">
  <button onclick="salvar()">Salvar Corrida</button>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <input type="text" id="busca" placeholder="Buscar...">
    <div class="lista" id="lista"></div>
  </div>
</div>

<script>

let origem=null;
let destino=null;
let parada=null;
let modo=null;
let listaAtual=[];

async function iniciar(){
  await DataManager.carregar();
  carregarMotoristas();
}

function abrirModal(tipo){

  modo = tipo;
  busca.value = "";

  let dados = [];

  if(tipo==="origem") dados = DataManager.listarOrigens();

  if(tipo==="parada"){
    if(!origem) return alert("Selecione origem");
    dados = DataManager.listarDestinos(origem);
  }

  if(tipo==="destino"){
    if(!origem) return alert("Selecione origem");
    dados = parada
      ? DataManager.listarDestinos(parada)
      : DataManager.listarDestinos(origem);
  }

  listaAtual = dados;
  renderLista(dados);
  modal.style.display="flex";
}

function renderLista(arr){
  lista.innerHTML="";
  arr.forEach(item=>{
    const div=document.createElement("div");
    div.innerText=item;
    div.onclick=()=>{
      selecionar(item);
      modal.style.display="none";
    };
    lista.appendChild(div);
  });
}

/* 🔥 BUSCA INTELIGENTE */
busca.addEventListener("input",()=>{
  const termo = busca.value
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");

  renderLista(
    listaAtual.filter(i =>
      i.toLowerCase()
       .normalize("NFD")
       .replace(/[\u0300-\u036f]/g, "")
       .includes(termo)
    )
  );
});

function selecionar(valor){

  if(modo==="origem"){
    origem=valor;
    parada=null;
    destino=null;
    origemTexto.innerText=valor;
    destinoTexto.innerText="Selecionar destino";
  }

  if(modo==="parada"){
    parada=valor;
    paradaTexto.innerText=valor;
  }

  if(modo==="destino"){
    destino=valor;
    destinoTexto.innerText=valor;
  }

  calcular();
}

/* EVENTOS */
origemBtn.onclick=()=>abrirModal("origem");
destinoBtn.onclick=()=>abrirModal("destino");
paradaBtn.onclick=()=>abrirModal("parada");

/* CALCULO */
function calcular(){

  if(!origem || !destino) return;

  let valor = !parada
    ? DataManager.buscarValor(origem,destino)
    : (DataManager.buscarValor(origem,parada)||0) +
      (DataManager.buscarValor(parada,destino)||0);

  valorBase = valor || 0;

  document.getElementById("valorBase").innerText = valorBase.toFixed(2);

  calcularTotal();
}

function calcularNoturno(){

  const hora = horaViagem.value;
  if(!hora) return 0;

  const [h,m] = hora.split(":").map(Number);
  const min = h*60+m;

  if(min>=1350 || min<300){
    return valorBase <= 24.99 ? 5 : valorBase*0.35;
  }

  return 0;
}

function calcularTotal(){

  const noturnoVal = calcularNoturno();

  document.getElementById("noturno").innerText = noturnoVal.toFixed(2);

  const total = valorBase + noturnoVal;

  document.getElementById("total").innerText = total.toFixed(2);
}

/* MOTORISTAS */
async function carregarMotoristas(){

  const { data } = await window.supabaseClient
    .from("motoristas")
    .select("id,nome");

  motorista.innerHTML = '<option value="">Nenhum</option>';

  data.forEach(m=>{
    motorista.innerHTML += `<option value="${m.id}">${m.nome}</option>`;
  });
}

/* SALVAR */
async function salvar(){

  const motorista_id = motorista.value || null;

  let status = document.getElementById("status").value;

  if(!motorista_id){
    status = "nao_atendida";
  }

  const { error } = await window.supabaseClient
    .from("corridas")
    .insert([{
      motorista_id,
      origem,
      destino,
      valor: Number(total.innerText),
      status,
      data_viagem: dataViagem.value,
      hora_viagem: horaViagem.value
    }]);

  if(error){
    console.log(error);
    alert("Erro");
    return;
  }

  alert("Salvo com sucesso");
  location.reload();
}

iniciar();

</script>

</body>
</html>
