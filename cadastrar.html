<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Nova Corrida</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="core/supabase.js"></script>

<style>
body{
  font-family:system-ui;
  padding:15px;
  background:#0f172a;
  color:#fff;
}

h2{
  text-align:center;
}

input, select{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #334155;
  background:#020617;
  color:#fff;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  font-weight:bold;
  color:#000;
}

.hidden{
  display:none;
}
</style>

</head>

<body>

<h2>🚗 Nova Corrida</h2>

<input id="grupo" placeholder="Grupo (Ex: RF Manhã)">
<input id="solicitante" placeholder="Quem solicitou">
<input id="telefone" placeholder="Telefone">

<input id="origem" placeholder="Origem">
<input id="destino" placeholder="Destino">

<input id="valor" type="number" placeholder="Valor da corrida">

<!-- MOTORISTA -->
<select id="motorista">
  <option value="">Selecione o motorista</option>
</select>

<!-- STATUS -->
<select id="status" onchange="toggleMotivo()">
  <option value="finalizada">Finalizada</option>
  <option value="cancelada">Cancelada</option>
</select>

<!-- MOTIVO -->
<input id="motivo" class="hidden" placeholder="Motivo do cancelamento">

<button onclick="salvar()">Salvar Corrida</button>

<script>

async function carregarMotoristas(){

  const { data } = await window.supabaseClient
    .from("motoristas")
    .select("id, nome")
    .order("nome");

  const select = document.getElementById("motorista");

  data.forEach(m => {
    const opt = document.createElement("option");
    opt.value = m.nome;
    opt.innerText = m.nome;
    select.appendChild(opt);
  });

}

function toggleMotivo(){
  const status = document.getElementById("status").value;
  const motivo = document.getElementById("motivo");

  if(status === "cancelada"){
    motivo.classList.remove("hidden");
  }else{
    motivo.classList.add("hidden");
  }
}

async function salvar(){

  const data = {
    grupo: grupo.value.trim(),
    solicitante: solicitante.value.trim(),
    telefone: telefone.value.trim(),
    origem: origem.value.trim(),
    destino: destino.value.trim(),
    valor: Number(valor.value),
    motorista: motorista.value,
    status: status.value,
    motivoCancelamento: motivo.value.trim(),
    data: new Date().toISOString()
  };

  if(!data.motorista){
    alert("Selecione um motorista");
    return;
  }

  const { error } = await window.supabaseClient
    .from("corridas")
    .insert([data]);

  if(error){
    console.log(error);
    alert("Erro ao salvar");
    return;
  }

  alert("Corrida registrada");
  location.reload();

}

carregarMotoristas();

</script>

</body>
</html>
