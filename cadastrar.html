<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Nova Corrida</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="core/supabase.js"></script>
<script src="core/datamanager.js"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background: radial-gradient(circle at top,#0b1220,#020617);
  color:#e5e7eb;
  padding:16px;
}
.card{
  background:rgba(30,41,59,.6);
  border:1px solid rgba(255,255,255,.05);
  border-radius:16px;
  padding:14px;
  margin-bottom:12px;
}
input, select{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.08);
  background:#020617;
  color:#fff;
  margin-bottom:10px;
}
h2{
  text-align:center;
  margin-bottom:16px;
}
.valor{
  font-size:18px;
  color:#22c55e;
  font-weight:bold;
}
button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  font-weight:bold;
  font-size:16px;
  color:#000;
}
button:active{
  transform:scale(0.97);
}
</style>

</head>

<body>

<h2>🚗 Nova Corrida</h2>

<!-- GRUPO DINÂMICO -->
<div class="card">
<select id="grupo">
  <option value="">Carregando grupos...</option>
</select>
</div>

<!-- ROTA -->
<div class="card">

<input id="buscaOrigem" placeholder="Buscar origem...">
<select id="origem"></select>

<button onclick="ativarParada()">+ Adicionar parada</button>

<input id="buscaParada" placeholder="Buscar parada..." style="display:none">
<select id="parada" style="display:none"></select>

<input id="buscaDestino" placeholder="Buscar destino...">
<select id="destino"></select>

</div>

<!-- VALORES -->
<div class="card">
<div>Base: R$ <span class="valor" id="valorBase">0.00</span></div>
<div>Noturno: R$ <span class="valor" id="noturno">0.00</span></div>
<div>Total: R$ <span class="valor" id="total">0.00</span></div>
</div>

<!-- TAXAS -->
<div class="card">
<input id="taxas" type="number" placeholder="Taxas adicionais">
</div>

<!-- DATA + HORA -->
<div class="card">
<input type="date" id="dataViagem">
<input type="time" id="horaViagem">
</div>

<!-- MOTORISTA -->
<div class="card">
<select id="motorista">
  <option value="">Selecione o motorista</option>
</select>
</div>

<!-- STATUS -->
<div class="card">
<select id="status">
  <option value="finalizada">Finalizada</option>
  <option value="cancelada">Cancelada</option>
  <option value="nao_atendida">Não atendida</option>
</select>
</div>

<button onclick="salvar()">Salvar Corrida</button>

<script>

function normalizar(texto){
  return texto
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9\s]/g, "");
}

let valorBase = 0;
let origemSelecionada = null;
let paradaSelecionada = null;

/* =========================
CRIA SELECT PESQUISÁVEL
========================= */

function criarSelectBusca(inputId, listaFn, onSelect){

  const input = document.getElementById(inputId);

  const dropdown = document.createElement("div");
  dropdown.style.background = "#020617";
  dropdown.style.border = "1px solid rgba(255,255,255,.1)";
  dropdown.style.borderRadius = "10px";
  dropdown.style.maxHeight = "150px";
  dropdown.style.overflowY = "auto";
  dropdown.style.marginBottom = "10px";

  input.parentNode.insertBefore(dropdown, input.nextSibling);

  input.oninput = ()=>{

    const termo = normalizar(input.value);
    const lista = listaFn();

    dropdown.innerHTML = "";

    lista
      .filter(item => normalizar(item).includes(termo))
      .forEach(item => {

        const opt = document.createElement("div");
        opt.innerText = item;
        opt.style.padding = "10px";
        opt.style.cursor = "pointer";

        opt.onclick = ()=>{
          input.value = item;
          dropdown.innerHTML = "";
          onSelect(item);
        };

        dropdown.appendChild(opt);

      });

  };

}

/* =========================
INIT
========================= */

async function iniciar(){
  await DataManager.carregar();
  carregarMotoristas();
  carregarGrupos();

  criarSelectBusca("origem", () => DataManager.listarOrigens(), (val)=>{
    origemSelecionada = val;
    atualizarDestinos();
  });

  criarSelectBusca("destino", () => {
    if(!origemSelecionada) return [];
    return DataManager.listarDestinos(origemSelecionada);
  }, (val)=>{
    destino.value = val;
    calcular();
  });

}

/* =========================
DESTINOS
========================= */

function atualizarDestinos(){
  paradaSelecionada = null;
}

/* =========================
PARADA
========================= */

function ativarParada(){

  if(!origemSelecionada) return alert("Selecione origem");

  parada.style.display = "block";

  criarSelectBusca("parada", () => {
    return DataManager.listarDestinos(origemSelecionada);
  }, (val)=>{
    paradaSelecionada = val;
  });

}

/* =========================
CALCULO
========================= */

function calcular(){

  const origemVal = document.getElementById("origem").value;
  const destinoVal = document.getElementById("destino").value;

  if(!origemVal || !destinoVal) return;

  let valor = 0;

  if(!paradaSelecionada){
    valor = DataManager.buscarValor(origemVal, destinoVal);
  }else{
    valor =
      (DataManager.buscarValor(origemVal, paradaSelecionada) || 0) +
      (DataManager.buscarValor(paradaSelecionada, destinoVal) || 0);
  }

  valorBase = valor || 0;
  valorBaseEl.innerText = valorBase.toFixed(2);

  calcularTotal();
}

/* =========================
NOTURNO
========================= */

function calcularNoturno(){

  const hora = horaViagem.value;
  if(!hora) return 0;

  const [h,m] = hora.split(":").map(Number);
  const minutos = h * 60 + m;

  const ehNoturno = (minutos >= 1350) || (minutos < 300);

  if(!ehNoturno) return 0;

  return valorBase <= 24.99 ? 5 : valorBase * 0.35;
}

/* =========================
TOTAL
========================= */

function calcularTotal(){

  const taxasVal = Number(taxas.value || 0);
  const noturnoVal = calcularNoturno();

  noturno.innerText = noturnoVal.toFixed(2);

  const total = valorBase + taxasVal + noturnoVal;

  totalEl.innerText = total.toFixed(2);
}

/* =========================
MOTORISTAS
========================= */

async function carregarMotoristas(){

  const { data } = await window.supabaseClient
    .from("motoristas")
    .select("id,nome")
    .order("nome");

  motorista.innerHTML = '<option value="">Selecione o motorista</option>';

  data.forEach(m=>{
    motorista.innerHTML += `<option value="${m.id}">${m.nome}</option>`;
  });
}

/* =========================
GRUPOS
========================= */

async function carregarGrupos(){

  const { data } = await window.supabaseClient
    .from("grupos")
    .select("id,nome")
    .eq("ativo", true)
    .order("nome");

  grupo.innerHTML = '<option value="">Selecione o grupo</option>';

  data.forEach(g=>{
    grupo.innerHTML += `<option value="${g.id}">${g.nome}</option>`;
  });
}

/* =========================
SALVAR
========================= */

async function salvar(){

  const corrida = {
    grupo_id: Number(grupo.value),
    motorista_id: motorista.value || null,
    origem: origem.value,
    destino: destino.value,
    valor: Number(totalEl.innerText || 0),
    status: status.value,
    data_viagem: dataViagem.value,
    hora_viagem: horaViagem.value,
    taxas: Number(taxas.value || 0),
    adicional_noturno: Number(noturno.innerText || 0),
    created_at: new Date().toISOString()
  };

  const { error } = await window.supabaseClient
    .from("corridas")
    .insert([corrida]);

  if(error){
    console.log(error);
    alert("Erro ao salvar");
    return;
  }

  alert("Corrida salva");
  location.reload();
}

/* START */
iniciar();

</script>

</body>
</html>
