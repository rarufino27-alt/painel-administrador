<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Nova Corrida</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="core/supabase.js"></script>
<script src="core/datamanager.js"></script>

<style>
body{
  font-family:system-ui;
  padding:15px;
  background:#0f172a;
  color:#fff;
}

h2{
  text-align:center;
}

input, select{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #334155;
  background:#020617;
  color:#fff;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  font-weight:bold;
  color:#000;
}

.box{
  background:#1e293b;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
}
</style>

</head>

<body>

<h2>🚗 Nova Corrida</h2>

<select id="origem"></select>

<button onclick="ativarParada()">+ Adicionar parada</button>

<select id="parada" style="display:none"></select>

<select id="destino"></select>

<div class="box">
  Valor base: R$ <span id="valorBase">0.00</span>
</div>

<input id="taxas" type="number" placeholder="Taxas adicionais (opcional)">
  
<input type="date" id="dataViagem">  

<label>
  <input type="checkbox" id="noturnoManual">
  Aplicar adicional noturno
</label>

<div class="box">
  🌙 Adicional noturno: R$ <span id="noturno">0.00</span>
</div>

<div class="box">
  💰 Valor final: R$ <span id="total">0.00</span>
</div>

<select id="motorista">
  <option value="">Selecione o motorista</option>
</select>

<select id="status">
  <option value="finalizada">Finalizada</option>
  <option value="cancelada">Cancelada</option>
</select>

<button onclick="salvar()">Salvar Corrida</button>

<script>

let valorBase = 0;

let origemSelecionada = null;
let paradaSelecionada = null;
let destinoSelecionado = null;

/* =========================
INIT
========================= */
async function iniciar(){

  await DataManager.carregar();

  popularOrigens();
  carregarMotoristas();

}

/* =========================
ORIGENS
========================= */
function popularOrigens(){

  const select = document.getElementById("origem");

  const origens = DataManager.listarOrigens();

  select.innerHTML = '<option value="">Selecione origem</option>';

  origens.forEach(o=>{
    const opt = document.createElement("option");
    opt.value = o;
    opt.innerText = o;
    select.appendChild(opt);
  });

}

/* =========================
DESTINOS (ORIGEM)
========================= */
function atualizarDestinos(){

  origemSelecionada = origem.value;
  paradaSelecionada = null;
  destinoSelecionado = null;

  parada.style.display = "none";

  const destinos = DataManager.listarDestinos(origemSelecionada);

  destino.innerHTML = '<option value="">Selecione destino</option>';

  destinos.forEach(d=>{
    const opt = document.createElement("option");
    opt.value = d;
    opt.innerText = d;
    destino.appendChild(opt);
  });

}

/* =========================
ATIVAR PARADA
========================= */
function ativarParada(){

  if(!origemSelecionada){
    alert("Selecione origem primeiro");
    return;
  }

  parada.style.display = "block";

  const destinos = DataManager.listarDestinos(origemSelecionada);

  parada.innerHTML = '<option value="">Selecione parada</option>';

  destinos.forEach(d=>{
    const opt = document.createElement("option");
    opt.value = d;
    opt.innerText = d;
    parada.appendChild(opt);
  });

}

/* =========================
PARADA
========================= */
parada.onchange = () => {

  paradaSelecionada = parada.value;

  const destinos = DataManager.listarDestinos(paradaSelecionada);

  destino.innerHTML = '<option value="">Selecione destino</option>';

  destinos.forEach(d=>{
    const opt = document.createElement("option");
    opt.value = d;
    opt.innerText = d;
    destino.appendChild(opt);
  });

};

/* =========================
CALCULAR BASE
========================= */
function calcular(){

  const o = origemSelecionada;
  const d = destino.value;

  if(!o || !d) return;

  let valor = 0;

  if(!paradaSelecionada){
    valor = DataManager.buscarValor(o, d);
  }else{
    valor =
      (DataManager.buscarValor(o, paradaSelecionada) || 0) +
      (DataManager.buscarValor(paradaSelecionada, d) || 0);
  }

  if(valor === null){
    alert("Rota não encontrada");
    return;
  }

  valorBase = valor;

  document.getElementById("valorBase").innerText = valor.toFixed(2);

  calcularTotal();

}

/* =========================
NOTURNO
========================= */
function calcularNoturno(valor){

  const manual = document.getElementById("noturnoManual").checked;

  const agora = new Date();
  const h = agora.getHours();
  const m = agora.getMinutes();

  const ehNoturno =
    manual ||
    (h === 22 && m >= 30) ||
    (h >= 23) ||
    (h < 5);

  if(!ehNoturno) return 0;

  if(valor <= 24.99){
    return 5;
  }else{
    return valor * 0.35;
  }

}

/* =========================
TOTAL
========================= */
function calcularTotal(){

  const taxas = Number(document.getElementById("taxas").value) || 0;

  const adicional = calcularNoturno(valorBase);

  document.getElementById("noturno").innerText = adicional.toFixed(2);

  const total = valorBase + adicional + taxas;

  document.getElementById("total").innerText = total.toFixed(2);

}

/* =========================
MOTORISTAS
========================= */
async function carregarMotoristas(){

  const { data } = await window.supabaseClient
    .from("motoristas")
    .select("id, nome")
    .order("nome");

  const select = document.getElementById("motorista");

  data.forEach(m=>{
    const opt = document.createElement("option");
    opt.value = m.id;
    opt.innerText = m.nome;
    select.appendChild(opt);
  });

}

/* =========================
SALVAR
========================= */
async function salvar(){

  const motorista_id = motorista.value;

  if(!motorista_id){
    alert("Selecione o motorista");
    return;
  }

  const total = parseFloat(document.getElementById("total").innerText);

  const taxas = Number(document.getElementById("taxas").value) || 0;
  const noturno = Number(document.getElementById("noturno").innerText) || 0;

  const hora_viagem = prompt("Informe o horário da viagem (HH:MM)");

  if(!hora_viagem){
    alert("Informe o horário da viagem");
    return;
  }

const data_viagem = document.getElementById("dataViagem").value;

if(!data_viagem){
  alert("Informe a data da viagem");
  return;
}

const corrida = {
  motorista_id,
  origem: origem.value,
  destino: destino.value,
  valor: total,
  status: status.value,

  data_viagem: data_viagem,
  data: new Date().toISOString()
};

  const { error } = await window.supabaseClient
    .from("corridas")
    .insert([corrida]);

  if(error){
    console.log(error);
    alert("Erro ao salvar");
    return;
  }

  alert("Corrida cadastrada com sucesso");
  location.reload();

}
/* =========================
EVENTOS
========================= */
origem.onchange = atualizarDestinos;
destino.onchange = calcular;
taxas.oninput = calcularTotal;
noturnoManual.onchange = calcularTotal;

/* =========================
START
========================= */
iniciar();

</script>

</body>
</html>
