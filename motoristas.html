<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Painel RF - Motoristas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="core/supabase.js"></script>

<style>

body{
  margin:0;
  font-family:system-ui;
  background:#0f172a;
  color:#fff;
}

.header{
  padding:15px;
  background:#1e293b;
  text-align:center;
  font-weight:700;
}

.container{
  padding:15px;
  max-width:600px;
  margin:auto;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
  border:1px solid #334155;
}

input, select{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #334155;
  background:#0f172a;
  color:#fff;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#3b82f6;
  color:#fff;
  font-weight:700;
}

.btn-del{
  background:#ef4444;
  margin-top:8px;
}

.small{
  font-size:13px;
  color:#94a3b8;
}

.section{
  margin-top:12px;
  font-weight:700;
  font-size:14px;
  opacity:0.8;
}

</style>

</head>

<body>

<div class="header">👤 Motoristas</div>

<div class="container">

<!-- CADASTRO -->
<div class="card">

<h3>Cadastrar Motorista</h3>

<div class="section">Dados Pessoais</div>

<input id="nome" placeholder="Nome completo">
<input id="cpf" placeholder="CPF">
<input id="rg" placeholder="RG">
<input id="endereco" placeholder="Endereço">

<input id="telefone1" placeholder="Telefone principal">
<input id="telefone2" placeholder="Telefone secundário (opcional)">

<div class="section">Habilitação</div>

<input id="cnh" placeholder="Número da CNH">

<select id="ear">
  <option value="">EAR na habilitação?</option>
  <option value="sim">Sim</option>
  <option value="nao">Não</option>
</select>

<div class="section">Veículo</div>

<input id="modelo" placeholder="Modelo / Marca">
<input id="ano" placeholder="Ano">
<input id="chassi" placeholder="Chassi">
<input id="placa" placeholder="Placa">
<input id="cor" placeholder="Cor">

<button onclick="salvar()">Cadastrar</button>

</div>

<!-- LISTA -->
<div id="lista"></div>

</div>

<script>

async function salvar(){

  const data = {
    nome: nome.value.trim(),
    cpf: cpf.value.trim(),
    rg: rg.value.trim(),
    endereco: endereco.value.trim(),

    telefone1: telefone1.value.trim(),
    telefone2: telefone2.value.trim(),

    cnh: cnh.value.trim(),
    ear: ear.value === "sim",

    modelo: modelo.value.trim(),
    ano: ano.value.trim(),
    chassi: chassi.value.trim(),
    placa: placa.value.trim(),
    cor: cor.value.trim()
  };

  if(!data.nome){
    alert("Nome obrigatório");
    return;
  }

  const { error } = await window.supabaseClient
    .from("motoristas")
    .insert([data]);

  if(error){
    console.log(error);
    alert("Erro ao salvar");
    return;
  }

  alert("Motorista cadastrado");
  location.reload();
}

async function carregar(){

  const { data } = await window.supabaseClient
    .from("motoristas")
    .select("*")
    .order("nome");

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  data.forEach(m => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <strong>${m.nome}</strong>

      <div class="small">CPF: ${m.cpf || "-"}</div>
      <div class="small">RG: ${m.rg || "-"}</div>

      <div class="small">📞 ${m.telefone1 || "-"}</div>
      ${m.telefone2 ? `<div class="small">📞 ${m.telefone2}</div>` : ""}

      <div class="small">CNH: ${m.cnh || "-"}</div>
      <div class="small">EAR: ${m.ear ? "Sim" : "Não"}</div>

      <div class="small">
        🚗 ${m.modelo || "-"} (${m.ano || "-"})
      </div>

      <div class="small">Placa: ${m.placa || "-"}</div>

      <button class="btn-del" onclick="excluir('${m.id}')">
        Excluir
      </button>
    `;

    lista.appendChild(div);

  });

}

async function excluir(id){

  if(!confirm("Excluir motorista?")) return;

  await window.supabaseClient
    .from("motoristas")
    .delete()
    .eq("id", id);

  carregar();
}

carregar();

</script>

</body>
</html>
