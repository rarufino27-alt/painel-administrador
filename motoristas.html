<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Painel RF - Motoristas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="core/supabase.js"></script>

<style>

body{
  margin:0;
  font-family:system-ui;
  background:#0f172a;
  color:#fff;
}

.header{
  padding:15px;
  background:#1e293b;
  text-align:center;
  font-weight:700;
}

.container{
  padding:15px;
  max-width:600px;
  margin:auto;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
  border:1px solid #334155;
}

input, select{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #334155;
  background:#0f172a;
  color:#fff;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#3b82f6;
  color:#fff;
  font-weight:700;
}

.btn-del{
  background:#ef4444;
  margin-top:8px;
}

.small{
  font-size:13px;
  color:#94a3b8;
}

</style>

</head>

<body>

<div class="header">
👤 Motoristas
</div>

<div class="container">

<!-- CADASTRO -->
<div class="card">

<h3>Cadastrar Motorista</h3>

<input id="nome" placeholder="Nome completo">
<input id="cpf" placeholder="CPF">
<input id="telefone" placeholder="Telefone">

<h4>Veículo</h4>

<input id="modelo" placeholder="Modelo / Marca">
<input id="ano" placeholder="Ano">
<input id="placa" placeholder="Placa">

<button onclick="salvar()">Cadastrar</button>

</div>

<!-- LISTA -->
<div id="lista"></div>

</div>

<script>

async function salvar(){

  const nome = document.getElementById("nome").value.trim();
  const cpf = document.getElementById("cpf").value.trim();
  const telefone = document.getElementById("telefone").value.trim();
  const modelo = document.getElementById("modelo").value.trim();
  const ano = document.getElementById("ano").value.trim();
  const placa = document.getElementById("placa").value.trim();

  if(!nome){
    alert("Nome obrigatório");
    return;
  }

  const { error } = await window.supabaseClient
    .from("motoristas")
    .insert([{
      nome,
      cpf,
      telefone,
      modelo,
      ano,
      placa
    }]);

  if(error){
    alert("Erro ao salvar");
    console.log(error);
    return;
  }

  alert("Motorista cadastrado");

  location.reload();
}

async function carregar(){

  const { data } = await window.supabaseClient
    .from("motoristas")
    .select("*")
    .order("nome");

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  data.forEach(m => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <strong>${m.nome}</strong>
      <div class="small">CPF: ${m.cpf || "-"}</div>
      <div class="small">Tel: ${m.telefone || "-"}</div>

      <div class="small">
        🚗 ${m.modelo || "-"} (${m.ano || "-"})
      </div>

      <div class="small">Placa: ${m.placa || "-"}</div>

      <button class="btn-del" onclick="excluir('${m.id}')">
        Excluir
      </button>
    `;

    lista.appendChild(div);

  });

}

async function excluir(id){

  if(!confirm("Excluir motorista?")) return;

  await window.supabaseClient
    .from("motoristas")
    .delete()
    .eq("id", id);

  carregar();
}

carregar();

</script>

</body>
</html>
