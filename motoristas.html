<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Painel Administrador RF - Motoristas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="core/supabase.js"></script>

<style>

/* BASE */
body{
  font-family:system-ui;
  margin:0;
  background:#0f172a;
  color:#e5e7eb;
}

/* HEADER */
.header{
  padding:15px;
  background:#1e293b;
  text-align:center;
  font-weight:700;
  font-size:18px;
  border-bottom:1px solid #334155;
}

/* CONTAINER */
.container{
  padding:15px;
  max-width:700px;
  margin:auto;
}

/* CARD */
.card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
  border:1px solid #334155;
}

/* TOP */
.top{
  display:flex;
  justify-content:space-between;
  font-weight:700;
  margin-bottom:6px;
}

/* TEXTO */
.small{
  font-size:13px;
  color:#94a3b8;
}

/* BOTÃO */
.btn{
  margin-top:10px;
  padding:8px;
  border:none;
  border-radius:8px;
  background:#3b82f6;
  color:#fff;
  cursor:pointer;
  width:100%;
}

/* STATUS */
.ok{ color:#22c55e; }
.bad{ color:#ef4444; }

</style>

</head>

<body>

<div class="header">
👤 Painel Administrador RF
</div>

<div class="container">

<h2>Motoristas</h2>

<div id="lista"></div>

</div>

<script>

if(localStorage.getItem("admin_logado") !== "true"){
  window.location.href = "login.html";
}
  
async function carregar(){

  const lista = document.getElementById("lista");

  lista.innerHTML = "Carregando...";

  // BUSCAR MOTORISTAS
  const { data: motoristas, error: erroMotoristas } = await supabase
    .from("motoristas")
    .select("*");

  if(erroMotoristas){
    lista.innerHTML = "Erro ao carregar motoristas";
    return;
  }

  // BUSCAR CORRIDAS
  const { data: corridas } = await supabase
    .from("corridas")
    .select("*");

  const ranking = {};

  // PROCESSAR
  motoristas.forEach(m => {

    ranking[m.id] = {
      nome: m.nome,
      total: 0,
      faturamento: 0,
      dados: m
    };

  });

  corridas.forEach(c => {

    if(!ranking[c.motorista_id]) return;

    if(c.status === "finalizada"){
      ranking[c.motorista_id].total++;
      ranking[c.motorista_id].faturamento += Number(c.valor);
    }

  });

  // ORDENAR
  const arr = Object.values(ranking)
    .sort((a,b) => b.total - a.total);

  lista.innerHTML = "";

  arr.forEach((m, index) => {

    const div = document.createElement("div");
    div.className = "card";

    // STATUS SIMPLES (ajustaremos depois)
    const emDia = true;

    div.innerHTML = `
      <div class="top">
        <span>${index+1}º ${m.nome}</span>
        <span>${m.total} corridas</span>
      </div>

      <div class="small">💰 R$ ${m.faturamento.toFixed(2)}</div>

      <div class="small ${emDia ? "ok" : "bad"}">
        ${emDia ? "✔ Regular" : "❌ Irregular"}
      </div>

      <button class="btn" onclick="detalhes('${m.dados.id}')">
        Ver detalhes
      </button>
    `;

    lista.appendChild(div);

  });

}

/* DETALHES */
async function detalhes(id){

  const { data: motorista } = await supabase
    .from("motoristas")
    .select("*")
    .eq("id", id)
    .single();

  const { data: corridas } = await supabase
    .from("corridas")
    .select("*")
    .eq("motorista_id", id);

  let texto = `👤 ${motorista.nome}\n\n`;

  texto += `CPF: ${motorista.cpf}\n`;
  texto += `CNH: ${motorista.cnh}\n\n`;

  texto += `🚗 Veículo:\n`;
  texto += `${motorista.modelo} - ${motorista.placa}\n\n`;

  texto += `📊 Corridas:\n`;

  corridas.forEach(c => {
    texto += `${c.origem} → ${c.destino} | R$ ${c.valor}\n`;
  });

  alert(texto);

}

carregar();

</script>

</body>
</html>
