<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>RF - Motoristas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="core/supabase.js"></script>

<style>

body{
  margin:0;
  font-family:system-ui;
  background:#020617;
  color:#fff;
}

.header{
  padding:16px;
  text-align:center;
  font-size:18px;
  font-weight:700;
  background:#0f172a;
  border-bottom:1px solid #1e293b;
}

.container{
  padding:15px;
  max-width:700px;
  margin:auto;
}

.card{
  background:#0f172a;
  padding:15px;
  border-radius:14px;
  margin-bottom:12px;
  border:1px solid #1e293b;
}

input{
  width:100%;
  padding:10px;
  margin-bottom:6px;
  border-radius:8px;
  border:1px solid #1e293b;
  background:#020617;
  color:#fff;
}

.small{
  font-size:13px;
  color:#94a3b8;
}

.row{
  display:flex;
  gap:6px;
  margin-top:8px;
}

button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  font-weight:bold;
}

.edit{ background:#3b82f6; color:#fff; }
.save{ background:#22c55e; color:#000; }
.delete{ background:#ef4444; color:#fff; }
.cancel{ background:#64748b; color:#fff; }

</style>

</head>

<body>

<div class="header">🚗 Motoristas RF</div>

<div class="container">

<div id="lista"></div>

</div>

<script>

/* =========================
CARREGAR LISTA
========================= */
async function carregar(){

  const { data, error } = await window.supabaseClient
    .from("motoristas")
    .select("*")
    .order("nome");

  if(error){
    console.log(error);
    alert("Erro ao carregar");
    return;
  }

  render(data);
}

/* =========================
RENDER
========================= */
function render(data){

  lista.innerHTML = "";

  data.forEach(m => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div id="view-${m.id}">
        <strong>${m.nome}</strong>

        <div class="small">📞 ${m.telefone}</div>
        <div class="small">📍 ${m.endereco || "-"}</div>
        <div class="small">🚗 ${m.marca || ""} ${m.modelo || ""}</div>
        <div class="small">🎨 ${m.cor || "-"}</div>
        <div class="small">🔖 ${m.placa || "-"}</div>

        <div class="row">
          <button class="edit" onclick="modoEditar('${m.id}')">Editar</button>
          <button class="delete" onclick="excluir('${m.id}')">Excluir</button>
        </div>
      </div>

      <div id="edit-${m.id}" style="display:none;">
        <input id="nome-${m.id}" value="${m.nome}">
        <input id="telefone-${m.id}" value="${m.telefone}">
        <input id="endereco-${m.id}" value="${m.endereco || ""}">
        <input id="marca-${m.id}" value="${m.marca || ""}">
        <input id="modelo-${m.id}" value="${m.modelo || ""}">
        <input id="cor-${m.id}" value="${m.cor || ""}">
        <input id="placa-${m.id}" value="${m.placa || ""}">

        <div class="row">
          <button class="save" onclick="salvarEdicao('${m.id}')">Salvar</button>
          <button class="cancel" onclick="cancelar('${m.id}')">Cancelar</button>
        </div>
      </div>
    `;

    lista.appendChild(div);

  });

}

/* =========================
MODO EDITAR
========================= */
function modoEditar(id){
  document.getElementById(`view-${id}`).style.display = "none";
  document.getElementById(`edit-${id}`).style.display = "block";
}

/* =========================
CANCELAR
========================= */
function cancelar(id){
  document.getElementById(`view-${id}`).style.display = "block";
  document.getElementById(`edit-${id}`).style.display = "none";
}

/* =========================
SALVAR EDIÇÃO
========================= */
async function salvarEdicao(id){

  const data = {
    nome: document.getElementById(`nome-${id}`).value.trim(),
    telefone: document.getElementById(`telefone-${id}`).value.trim(),
    endereco: document.getElementById(`endereco-${id}`).value.trim(),
    marca: document.getElementById(`marca-${id}`).value.trim(),
    modelo: document.getElementById(`modelo-${id}`).value.trim(),
    cor: document.getElementById(`cor-${id}`).value.trim(),
    placa: document.getElementById(`placa-${id}`).value.trim()
  };

  if(!data.nome || !data.telefone){
    alert("Nome e telefone obrigatórios");
    return;
  }

  const { error } = await window.supabaseClient
    .from("motoristas")
    .update(data)
    .eq("id", id);

  if(error){
    console.log(error);
    alert("Erro ao salvar");
    return;
  }

  carregar();
}

/* =========================
EXCLUIR
========================= */
async function excluir(id){

  if(!confirm("Excluir motorista?")) return;

  const { error } = await window.supabaseClient
    .from("motoristas")
    .delete()
    .eq("id", id);

  if(error){
    console.log(error);
    alert("Erro ao excluir");
    return;
  }

  carregar();
}

/* START */
carregar();

</script>

</body>
</html>
