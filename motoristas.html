<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Motoristas RF</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="core/datamanager.js"></script>

<style>
body{
  font-family:system-ui;
  margin:0;
  background:#111;
  color:#fff;
}

.container{
  padding:15px;
}

h1{
  text-align:center;
}

/* CARD */
.card{
  background:#1c1c1c;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

.top{
  display:flex;
  justify-content:space-between;
  font-weight:bold;
}

.small{
  font-size:13px;
  opacity:0.7;
}

.btn{
  margin-top:8px;
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#facc15;
}

/* STATUS */
.ok{ color:#22c55e; }
.bad{ color:#ef4444; }
</style>

</head>

<body>

<div class="container">

<h1>👤 Motoristas</h1>

<div id="lista"></div>

</div>

<script>

function carregar(){

  const data = DataManager.get();

  const lista = document.getElementById("lista");

  const ranking = {};

  // AGRUPAR DADOS
  data.corridas.forEach(c => {

    if(!ranking[c.motorista]){
      ranking[c.motorista] = {
        nome: c.motorista,
        total: 0,
        faturamento: 0
      };
    }

    if(c.status === "finalizada"){
      ranking[c.motorista].total++;
      ranking[c.motorista].faturamento += c.valor;
    }

  });

  // TRANSFORMAR EM ARRAY + ORDENAR
  const arr = Object.values(ranking)
    .sort((a,b) => b.total - a.total);

  lista.innerHTML = "";

  arr.forEach((m, index) => {

    const div = document.createElement("div");
    div.className = "card";

    // STATUS contribuição (simulado por enquanto)
    const emDia = Math.random() > 0.3;

    div.innerHTML = `
      <div class="top">
        <span>${index+1}º ${m.nome}</span>
        <span>${m.total} corridas</span>
      </div>

      <div class="small">
        💰 R$ ${m.faturamento.toFixed(2)}
      </div>

      <div class="small ${emDia ? "ok" : "bad"}">
        ${emDia ? "✔ Contribuição em dia" : "❌ Em atraso"}
      </div>

      <button class="btn" onclick="detalhes('${m.nome}')">
        Ver detalhes
      </button>
    `;

    lista.appendChild(div);

  });

}

/* DETALHES */
function detalhes(nome){

  const data = DataManager.get();

  const corridas = data.corridas.filter(c => c.motorista === nome);

  let texto = `Motorista: ${nome}\n\n`;

  corridas.forEach(c => {
    texto += `${c.origem} → ${c.destino} | R$ ${c.valor}\n`;
  });

  alert(texto);

}

carregar();

</script>

</body>
</html>
