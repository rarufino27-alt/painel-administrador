<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Corridas RF</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="core/supabase.js"></script>

<style>

body{
  font-family:system-ui;
  margin:0;
  background:#0f172a;
  color:#fff;
}

.header{
  padding:15px;
  text-align:center;
  background:#1e293b;
  font-weight:700;
}

.container{
  padding:15px;
  max-width:700px;
  margin:auto;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:8px;
  border:1px solid #334155;
  background:#020617;
  color:#fff;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
  border:1px solid #334155;
}

.top{
  display:flex;
  justify-content:space-between;
  font-weight:bold;
}

.small{
  font-size:13px;
  color:#94a3b8;
}

.status-ok{
  color:#22c55e;
}

.status-bad{
  color:#ef4444;
}

.btn{
  margin-top:10px;
  padding:8px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.excluir{
  background:#ef4444;
  color:#fff;
}

</style>

</head>

<body>

<div class="header">📋 Corridas</div>

<div class="container">

<input id="filtro" placeholder="Buscar por motorista..." oninput="carregar()">

<div id="lista"></div>

</div>

<script>

let corridasData = [];

async function carregar(){

  const filtro = document.getElementById("filtro").value.toLowerCase();

  const { data, error } = await window.supabaseClient
    .from("corridas")
    .select(`
      id,
      origem,
      destino,
      valor,
      status,
      data,
      motoristas ( nome )
    `)
    .order("data", { ascending: false });

  if(error){
    console.log(error);
    alert("Erro ao carregar corridas");
    return;
  }

  corridasData = data;

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  data.forEach(c => {

    const nomeMotorista = c.motoristas?.nome || "Sem motorista";

    if(filtro && !nomeMotorista.toLowerCase().includes(filtro)){
      return;
    }

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="top">
        <span>${nomeMotorista}</span>
        <span>R$ ${c.valor}</span>
      </div>

      <div>${c.origem} → ${c.destino}</div>

      <div class="small">
        ${new Date(c.data).toLocaleString()}
      </div>

      <div class="small ${c.status === "finalizada" ? "status-ok" : "status-bad"}">
        ${c.status === "finalizada" ? "✅ Finalizada" : "❌ Cancelada"}
      </div>

      <button class="btn excluir" onclick="excluir('${c.id}')">
        Excluir
      </button>
    `;

    lista.appendChild(div);

  });

}

async function excluir(id){

  if(!confirm("Excluir corrida?")) return;

  const { error } = await window.supabaseClient
    .from("corridas")
    .delete()
    .eq("id", id);

  if(error){
    alert("Erro ao excluir");
    return;
  }

  carregar();
}

carregar();

</script>

</body>
</html>
