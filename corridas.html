<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Corridas RF</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="core/supabase.js"></script>

<style>

body{
  margin:0;
  font-family:system-ui;
  background:#0f172a;
  color:#fff;
}

.header{
  padding:15px;
  text-align:center;
  font-weight:bold;
  background:#1e293b;
}

.container{
  padding:15px;
  max-width:700px;
  margin:auto;
}

input, select{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #334155;
  background:#020617;
  color:#fff;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
  border-left:5px solid transparent;
}

.finalizada{ border-left:5px solid #22c55e; }
.cancelada{ border-left:5px solid #ef4444; }

.small{
  font-size:13px;
  color:#94a3b8;
}

.valor{
  font-size:18px;
  font-weight:bold;
  color:#facc15;
}

.btn{
  margin-top:6px;
  padding:8px;
  border:none;
  border-radius:8px;
  width:100%;
  font-weight:bold;
}

.edit{ background:#3b82f6; color:#fff; }
.delete{ background:#ef4444; color:#fff; }
.refresh{ background:#22c55e; color:#000; }

</style>

</head>

<body>

<div class="header">📋 Corridas RF</div>

<div class="container">

<button class="btn refresh" onclick="carregar()">🔄 Atualizar</button>

<input id="busca" placeholder="Buscar motorista">

<select id="filtroStatus">
  <option value="">Todos</option>
  <option value="finalizada">Finalizadas</option>
  <option value="cancelada">Canceladas</option>
</select>

<div id="lista"></div>

</div>

<script>

let corridas = [];

/* =========================
CARREGAR (SEM CACHE)
========================= */
async function carregar(){

  const { data, error } = await window.supabaseClient
    .from("corridas")
    .select(`
      *,
      motoristas(nome)
    `)
    .order("data_viagem", { ascending:false });

  if(error){
    console.log(error);
    alert("Erro ao carregar");
    return;
  }

  corridas = data;

  render();

}

/* =========================
RENDER COMPLETO
========================= */
function render(){

  const lista = document.getElementById("lista");
  const busca = document.getElementById("busca").value.toLowerCase();
  const statusFiltro = document.getElementById("filtroStatus").value;

  lista.innerHTML = "";

  corridas
    .filter(c => {

      const nome = c.motoristas?.nome || "";

      if(busca && !nome.toLowerCase().includes(busca)) return false;

      if(statusFiltro && c.status !== statusFiltro) return false;

      return true;

    })
    .forEach(c => {

      let rota = `${c.origem} → ${c.destino}`;

      if(c.parada){
        rota = `${c.origem} → 🛑 ${c.parada} → ${c.destino}`;
      }

      const taxas = c.taxas ? `💸 Taxas: R$ ${c.taxas.toFixed(2)}` : "";
      const noturno = c.noturno ? `🌙 Noturno: R$ ${c.noturno.toFixed(2)}` : "";

      const div = document.createElement("div");
      div.className = "card " + (c.status || "finalizada");

      div.innerHTML = `
        <strong>${c.motoristas?.nome || "Sem motorista"}</strong>

        <div class="small">${rota}</div>

        <div class="valor">R$ ${c.valor.toFixed(2)}</div>

        <div class="small">📅 ${c.data_viagem || "-"}</div>
        <div class="small">🕒 ${c.hora_viagem || "-"}</div>

        ${taxas ? `<div class="small">${taxas}</div>` : ""}
        ${noturno ? `<div class="small">${noturno}</div>` : ""}

        <div class="small">
          Status: ${c.status || "finalizada"}
        </div>

        <button class="btn edit" onclick="editar('${c.id}')">
          Editar
        </button>

        <button class="btn delete" onclick="excluir('${c.id}')">
          Excluir
        </button>
      `;

      lista.appendChild(div);

    });

}

/* =========================
EXCLUIR
========================= */
async function excluir(id){

  if(!confirm("Excluir corrida?")) return;

  await window.supabaseClient
    .from("corridas")
    .delete()
    .eq("id", id);

  carregar();

}

/* =========================
EVENTOS
========================= */
busca.oninput = render;
filtroStatus.onchange = render;

/* =========================
AUTO REFRESH (A CADA 5s)
========================= */
setInterval(carregar, 5000);

/* START */
carregar();

</script>

</body>
</html>
