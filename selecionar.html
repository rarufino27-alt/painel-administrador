<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>RF – Resumo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="theme/theme.css">

<style>

body{
margin:0;
font-family:Arial;
background:var(--bg);
color:var(--text);
}

/* HEADER */
.top{
display:flex;
align-items:center;
justify-content:space-between;
padding:16px;
background:#111;
border-bottom:1px solid #222;
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-weight:bold;
}

/* CONTAINER */
.container{
max-width:420px;
margin:auto;
padding:16px;
display:flex;
flex-direction:column;
gap:16px;
}

/* CARD */
.card{
background:var(--card-bg);
border:1px solid var(--border-color);
border-radius:16px;
padding:16px;
box-shadow:0 10px 30px rgba(0,0,0,.4);
border:1px solid rgba(255,255,255,.05);
}

/* ROTA */
.rota{
display:flex;
justify-content:space-between;
align-items:center;
}

.rota-box{
flex:1;
}

.label{
font-size:12px;
color:var(--text-secondary);
}

.nome{
font-weight:bold;
}

/* LINHAS */
.linha{
display:flex;
justify-content:space-between;
margin:6px 0;
}

/* PAGAMENTO */
.pagamentos{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.pagamento{
padding:14px;
border-radius:12px;
border:1px solid #333;
text-align:center;
cursor:pointer;
transition:.2s;
}

.pagamento:hover{
transform:scale(0.97);
}

.pagamento.ativo{
border:2px solid #facc15;
background:rgba(250,204,21,.1);
color:#facc15;
}

/* TOTAL */
.total{
font-size:28px;
font-weight:bold;
color:#facc15;
margin-top:6px;
}

/* BOTÕES */
.botoes{
display:flex;
gap:10px;
}

button{
flex:1;
padding:16px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

.btn-wpp{
background:#16a34a;
color:#fff;
}

.btn-pdf{
background:#facc15;
color:#000;
}

</style>

</head>

<body>

<div class="top">
  <div class="logo">
    <img src="icons/icon-512.png" width="28">
    RF MOTORISTA
  </div>
</div>

<div class="container">

<!-- ROTA -->
<div class="card rota">
<div class="rota-box">
<div class="label">Origem</div>
<div class="nome" id="origem"></div>
</div>

<div>→</div>

<div class="rota-box">
<div class="label">Destino</div>
<div class="nome" id="destino"></div>
</div>
</div>

<!-- DETALHES -->
<div class="card">
<h3>Resumo da viagem</h3>
<div id="detalhes"></div>
</div>

<!-- TAXAS -->
<div class="card">
<h3>Taxas adicionais</h3>
<div id="taxas"></div>
</div>

<!-- PAGAMENTO -->
<div class="card">
<h3>Forma de pagamento</h3>

<div class="pagamentos">
<div class="pagamento ativo" data="dinheiro">💵 Dinheiro</div>
<div class="pagamento" data="pix">⚡ PIX</div>
<div class="pagamento" data="credito">💳 Crédito</div>
<div class="pagamento" data="debito">🏧 Débito</div>
</div>

</div>

<!-- TOTAL -->
<div class="card">
<div class="label">Total da viagem</div>
<div class="total" id="total"></div>

<div id="resumoValores"></div>
</div>

<!-- BOTÕES -->
<div class="botoes">
<button class="btn-wpp" onclick="wpp()">WhatsApp</button>
<button class="btn-pdf" onclick="pdf()">Gerar PDF</button>
</div>

</div>

<script>

(function(){
  const tema = localStorage.getItem("rf_theme") || "dark";
  document.body.setAttribute("data-theme", tema);
})();

/* DADOS */
const d = JSON.parse(localStorage.getItem("rf_corrida_temp"));

if(!d){
alert("Erro nos dados");
location.href="home.html";
}

/* ROTA */
origem.innerText = d.origem;
destino.innerText = d.destino;

/* DETALHES */
detalhes.innerHTML = `
Veículo: ${d.categoria>1?"6 lugares":"4 lugares"}<br>
Embarque: ${d.embarque || "-"}<br>
Obs: ${d.obs || "-"}
`;

/* TAXAS */
taxas.innerHTML = `
<div class="linha"><span>Feira</span><span>R$ ${d.feira}</span></div>
<div class="linha"><span>Animal</span><span>R$ ${d.animal}</span></div>
<div class="linha"><span>Saída Praia</span><span>R$ ${d.saidaPraia}</span></div>
`;

/* TOTAL BASE */
let totalBase = parseFloat(d.total.replace("R$ ","").replace(",","."));
let totalFinal = totalBase;

/* PAGAMENTO */
let pagamento = "dinheiro";

function atualizarTotal(){

  totalFinal = totalBase;

  if(pagamento === "credito"){
    totalFinal = totalBase / 0.95;
  }

  if(pagamento === "debito"){
    totalFinal = totalBase / 0.98;
  }

  total.innerText = "R$ " + totalFinal.toFixed(2);
}

/* INIT */
atualizarTotal();

/* CLICK PAGAMENTO */
document.querySelectorAll(".pagamento").forEach(p=>{
  p.onclick = ()=>{
    document.querySelectorAll(".pagamento").forEach(x=>x.classList.remove("ativo"));
    p.classList.add("ativo");

    pagamento = p.getAttribute("data");

    atualizarTotal();
  };
});

/* RESUMO */
resumoValores.innerHTML = `
<div>Base: R$ ${d.base}</div>
<div>Taxas: R$ ${d.taxas}</div>
`;

/* WHATS */
function wpp(){

let msg = `🚗 *RF DRIVER*

📍 ${d.origem} → ${d.destino}

💰 R$ ${totalFinal.toFixed(2)}
💳 Pagamento: ${pagamento}`;

window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
}

/* PDF */
function pdf(){
window.open("https://backend-recibo-rf.onrender.com");
}

</script>

</body>
</html>
