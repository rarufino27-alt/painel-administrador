<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>RF Motorista</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* BASE */
body{
  margin:0;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#0f172a,#020617);
  font-family:system-ui;
  color:#fff;
  overflow:hidden;
}

/* CONTAINER */
.container{
  text-align:center;
}

/* LOGO */
.logo{
  width:90px;
  height:90px;
  border-radius:20px;
  margin-bottom:15px;
  animation:zoom 1s ease;
}

/* NOME */
.title{
  font-size:22px;
  font-weight:800;
  margin-bottom:5px;
}

.sub{
  font-size:13px;
  opacity:0.7;
}

/* LOADING */
.loader{
  margin-top:25px;
  width:40px;
  height:40px;
  border:4px solid rgba(255,255,255,0.1);
  border-top:4px solid #22c55e;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

/* ANIMAÇÕES */
@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}

@keyframes zoom{
  from{transform:scale(0.5);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

</style>

</head>

<body>

<div class="container">

<img src="icons/icon-512.png" class="logo">

<div class="title">RF Motorista</div>
<div class="sub">Painel Administrador</div>

<div class="loader"></div>

</div>

<script>

/* =========================
REDIRECIONAMENTO INTELIGENTE
========================= */

setTimeout(()=>{

  // verifica login
  if(localStorage.getItem("admin_logado") === "true"){
    window.location.href = "dashboard.html";
  }else{
    window.location.href = "login.html";
  }

}, 2000);

</script>

</body>
</html>
