<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>RF – Resumo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="core/taxas.js"></script>

<style>

:root{
--rf-yellow:#ffd600;
--rf-yellow-strong:#ffb800;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

body{
background: radial-gradient(circle at top,#1a1a1a 0%,#000 70%);
color:#fff;
}

.header{
padding:30px 25px 10px;
font-size:22px;
font-weight:900;
}

.container{
padding:10px 25px 140px;
max-width:450px;
margin:auto;
}

.card{
background:rgba(255,255,255,.06);
border-radius:26px;
padding:22px;
margin-bottom:22px;
border:1px solid rgba(255,255,255,.08);
}

.card h3{
margin-bottom:14px;
font-size:15px;
opacity:.8;
}

.rota-item{
margin-bottom:6px;
}

textarea{
width:100%;
border-radius:16px;
padding:14px;
border:none;
background:rgba(255,255,255,.08);
color:#fff;
height:90px;
}

.categoria{
display:flex;
gap:12px;
}

.cat{
flex:1;
padding:16px;
border-radius:18px;
text-align:center;
cursor:pointer;
background:rgba(255,255,255,.08);
font-weight:600;
}

.cat.active{
background:linear-gradient(135deg,var(--rf-yellow),var(--rf-yellow-strong));
color:#000;
}

.linha{
display:flex;
justify-content:space-between;
margin-bottom:8px;
}

.total{
font-size:22px;
font-weight:900;
margin-top:14px;
color:var(--rf-yellow);
}

.footer{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#000;
padding:20px;
}

.footer-inner{
max-width:450px;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
}

.valor{
font-size:26px;
font-weight:900;
color:var(--rf-yellow);
}

button{
padding:14px 30px;
border:none;
border-radius:30px;
background:linear-gradient(135deg,var(--rf-yellow),var(--rf-yellow-strong));
font-weight:800;
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">Resumo da Viagem</div>

<div class="container">

<div class="card">
<h3>Rota</h3>
<div id="rota"></div>
</div>

<div class="card">
<h3>Observação ao motorista</h3>
<textarea id="obs"></textarea>
</div>

<div class="card">
<h3>Categoria</h3>

<div class="categoria">

<div class="cat active" id="cat4">Driver 4</div>
<div class="cat" id="cat6">Driver 6 (+50%)</div>

</div>

</div>

<div class="card">
<h3>Detalhamento</h3>
<div id="detalhe"></div>
</div>

</div>

<div class="footer">

<div class="footer-inner">

<div class="valor" id="valorFinal">R$ 0,00</div>

<button onclick="enviar()">Solicitar</button>

</div>

</div>

<script>

const corrida = JSON.parse(localStorage.getItem("rf_corrida_temp"));

if(!corrida){
location.href="home.html";
}

let {
origem,
parada,
destino,
valor = 0,
desvioRota = false,
mercado = false
} = corrida;

let categoriaMult = 1;

function montarRota(){

let html = `
<div class="rota-item">Origem: ${origem}</div>
`;

if(parada){

html += `<div class="rota-item">Parada: ${parada}</div>`;

}

html += `<div class="rota-item">Destino: ${destino}</div>`;

document.getElementById("rota").innerHTML = html;

}

function calcular(){

let base = Number(valor);

let detalheHTML = "";

detalheHTML += `
<div class="linha">
<span>Base</span>
<span>R$ ${base.toFixed(2)}</span>
</div>
`;

let taxas = [];

const t1 = Taxas.noturno(base);
if(t1) taxas.push(t1);

const t2 = Taxas.desvio(desvioRota);
if(t2) taxas.push(t2);

const t3 = Taxas.mercado(mercado);
if(t3) taxas.push(t3);

const t4 = Taxas.praia(destino);
if(t4) taxas.push(t4);

taxas.forEach(t =>{

detalheHTML += `
<div class="linha">
<span>${t.nome}</span>
<span>R$ ${t.valor.toFixed(2)}</span>
</div>
`;

base += t.valor;

});

const categoria = Taxas.categoria(categoriaMult,base);

if(categoria){

detalheHTML += `
<div class="linha">
<span>${categoria.nome}</span>
<span>R$ ${categoria.valor.toFixed(2)}</span>
</div>
`;

base += categoria.valor;

}

detalheHTML += `
<div class="total">Total: R$ ${base.toFixed(2)}</div>
`;

document.getElementById("detalhe").innerHTML = detalheHTML;

document.getElementById("valorFinal").innerText = "R$ "+base.toFixed(2);

localStorage.setItem("rf_total_final",base.toFixed(2));

}

cat4.onclick=()=>{

categoriaMult = 1;

cat4.classList.add("active");
cat6.classList.remove("active");

calcular();

}

cat6.onclick=()=>{

categoriaMult = 1.5;

cat6.classList.add("active");
cat4.classList.remove("active");

calcular();

}

function enviar(){

calcular();

const total = localStorage.getItem("rf_total_final");

const msg = `
🚖 SOLICITAÇÃO RF

Origem: ${origem}
Destino: ${destino}

Total: R$ ${Number(total).toFixed(2)}
`;

window.open("https://wa.me/?text="+encodeURIComponent(msg));

}

montarRota();

calcular();

</script>

</body>
</html>
