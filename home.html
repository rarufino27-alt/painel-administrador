<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>RF Passageiro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

:root{
--rf-gold:#D6B85F;
--rf-gold-strong:#F4D97A;
--rf-panel:#0E1320;
}

html,body{
margin:0;
padding:0;
height:100%;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
background:#000;
color:white;
}

#map{
position:absolute;
height:100%;
width:100%;
}

/* CARD SUPERIOR */

.search-card{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
width:92%;
max-width:420px;
background:linear-gradient(180deg,#0E1320,#06080E);
border-radius:18px;
padding:16px;
box-shadow:0 10px 30px rgba(0,0,0,.8);
border:1px solid rgba(214,184,95,.35);
display:flex;
flex-direction:column;
gap:10px;
z-index:10;
}

.row{
display:flex;
align-items:center;
gap:10px;
}

.dot{
width:10px;
height:10px;
border-radius:50%;
}

.green{background:#22c55e}
.red{background:#ef4444}
.blue{background:#3b82f6}

input{
flex:1;
padding:12px;
border-radius:10px;
border:none;
background:#12192A;
color:white;
font-size:14px;
outline:none;
}

.add-stop{
width:40px;
height:40px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:bold;
background:linear-gradient(135deg,var(--rf-gold),var(--rf-gold-strong));
color:black;
cursor:pointer;
}

/* RESUMO */

.trip-info{
position:absolute;
bottom:0;
left:0;
width:100%;
background:linear-gradient(180deg,#0E1320,#06080E);
padding:22px;
border-radius:24px 24px 0 0;
box-shadow:0 -10px 30px rgba(0,0,0,.9);
border-top:1px solid rgba(214,184,95,.35);
z-index:10;
}

.price{
font-size:28px;
font-weight:800;
color:var(--rf-gold-strong);
}

</style>
</head>

<body>

<div id="map"></div>

<div class="search-card">

<div class="row">
<div class="dot green"></div>
<input id="origemInput" readonly placeholder="Detectando sua localização...">
</div>

<div class="row" id="stop1Row" style="display:none">
<div class="dot blue"></div>
<input id="stop1" placeholder="Adicionar parada">
</div>

<div class="row" id="stop2Row" style="display:none">
<div class="dot blue"></div>
<input id="stop2" placeholder="Adicionar parada">
</div>

<div class="row">
<div class="dot red"></div>
<input id="destinoInput" placeholder="Para onde vamos?">
<div class="add-stop" onclick="addParada()">+</div>
</div>

</div>

<div class="trip-info">

<h3>Resumo da corrida</h3>

<div>Distância: <span id="dist">--</span></div>
<div>Tempo estimado: <span id="tempo">--</span></div>

<div style="margin-top:10px">

Valor estimado

<div class="price" id="valor">R$ --</div>

</div>

</div>

<script>

let map
let directionsService
let directionsRenderer
let marcadorUsuario
let userLocation
let stopCount=0

function initMap(){

map=new google.maps.Map(document.getElementById("map"),{
zoom:17,
center:{lat:-8.283,lng:-35.032},
disableDefaultUI:true
})

directionsService=new google.maps.DirectionsService()
directionsRenderer=new google.maps.DirectionsRenderer({
map:map,
suppressMarkers:false
})

iniciarLocalizacao()
initAutocomplete()

}

/* LOCALIZAÇÃO DO USUÁRIO */

function iniciarLocalizacao(){

navigator.geolocation.watchPosition(

(pos)=>{

const posicao={
lat:pos.coords.latitude,
lng:pos.coords.longitude
}

userLocation=posicao

if(!marcadorUsuario){

marcadorUsuario=new google.maps.Marker({
position:posicao,
map:map,
icon:"https://maps.google.com/mapfiles/ms/icons/blue-dot.png"
})

map.setCenter(posicao)

}else{

marcadorUsuario.setPosition(posicao)

}

document.getElementById("origemInput").value="Sua localização"

},

(err)=>{

alert("Permita o acesso à localização")

},

{
enableHighAccuracy:true,
maximumAge:0,
timeout:10000
}

)

}

/* AUTOCOMPLETE DESTINO */

function initAutocomplete(){

const destinoInput=document.getElementById("destinoInput")

const autoDestino=new google.maps.places.Autocomplete(destinoInput,{
componentRestrictions:{country:"br"},
fields:["geometry","name"]
})

autoDestino.addListener("place_changed",()=>{
calcularRota()
})

}

/* ADICIONAR PARADA */

function addParada(){

if(stopCount===0){

document.getElementById("stop1Row").style.display="flex"
initStop("stop1")
stopCount++

}else if(stopCount===1){

document.getElementById("stop2Row").style.display="flex"
initStop("stop2")
stopCount++

}

}

/* AUTOCOMPLETE PARADAS */

function initStop(id){

const input=document.getElementById(id)

const auto=new google.maps.places.Autocomplete(input,{
componentRestrictions:{country:"br"},
fields:["geometry"]
})

auto.addListener("place_changed",()=>{
calcularRota()
})

}

/* CALCULAR ROTA */

function calcularRota(){

const destino=document.getElementById("destinoInput").value

if(!destino || !userLocation) return

let waypoints=[]

if(document.getElementById("stop1").value){
waypoints.push({location:document.getElementById("stop1").value})
}

if(document.getElementById("stop2").value){
waypoints.push({location:document.getElementById("stop2").value})
}

directionsService.route({

origin:userLocation,
destination:destino,
waypoints:waypoints,
travelMode:"DRIVING"

},function(result,status){

if(status==="OK"){

directionsRenderer.setDirections(result)

let legs=result.routes[0].legs

let distancia=0
let tempo=0

legs.forEach(l=>{
distancia+=l.distance.value
tempo+=l.duration.value
})

distancia=distancia/1000
tempo=Math.round(tempo/60)

document.getElementById("dist").innerText=distancia.toFixed(1)+" km"
document.getElementById("tempo").innerText=tempo+" min"

let valor=(distancia*1.8)+(distancia*0.10)

if(valor<10) valor=10

document.getElementById("valor").innerText="R$ "+valor.toFixed(2)

}

})

}

</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA1cAOVDUPslp3eRQilh41tte_jqqzeY00&libraries=places&callback=initMap" async defer></script>

</body>
</html>
