<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>RF Passageiro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="core/datamanager.js"></script>

<style>

:root{
--rf-gold:#D6B85F;
--rf-gold-strong:#F4D97A;
--rf-bg:#070910;
--rf-panel:#0E1320;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

body{
background:#000;
color:#fff;
overflow-x:hidden;
transition:.25s;
}

/* MAPA */

#map{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* BOTÃO LOCALIZAÇÃO */

.loc-btn{
position:fixed;
bottom:170px;
right:20px;
width:48px;
height:48px;
border-radius:50%;
border:none;
background:white;
font-size:20px;
cursor:pointer;
box-shadow:0 4px 12px rgba(0,0,0,.35);
z-index:5;
}

/* HEADER */

.header{
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(214,184,95,.25);
background:rgba(0,0,0,.5);
backdrop-filter:blur(8px);
}

.logo{
font-weight:900;
font-size:22px;
color:var(--rf-gold-strong);
letter-spacing:2px;
}

.status{
font-size:12px;
opacity:.7;
}

/* HERO */

.hero{
padding:22px;
font-size:30px;
font-weight:900;
line-height:1.2;
letter-spacing:.5px;
background:rgba(0,0,0,.4);
}

/* HERO VISUAL */

.hero-visual{
position:relative;
height:240px;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
}

.hero-slide{
position:absolute;
inset:0;
opacity:0;
transition:opacity 1s ease;
}

.hero-slide.active{
opacity:1;
}

.hero-slide img{
width:100%;
height:100%;
object-fit:cover;
}

.hero-slide::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(
to bottom,
rgba(0,0,0,.15),
rgba(0,0,0,.75)
);
}

/* INDICADORES */

.slider-dots{
position:absolute;
bottom:10px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:8px;
z-index:5;
}

.dot-ind{
width:8px;
height:8px;
border-radius:50%;
background:rgba(255,255,255,.35);
transition:.3s;
}

.dot-ind.active{
background:var(--rf-gold);
transform:scale(1.3);
}

/* PANEL */

.panel{
position:fixed;
bottom:0;
width:100%;
background:linear-gradient(180deg,#0F1422,#06080E);
border-top-left-radius:28px;
border-top-right-radius:28px;
padding:24px;
border-top:1px solid rgba(214,184,95,.35);
box-shadow:0 -10px 40px rgba(0,0,0,.8);
}

.panel-inner{
max-width:420px;
margin:auto;
display:flex;
flex-direction:column;
gap:14px;
}

/* BOX */

.box{
background:#12192A;
border:1px solid rgba(214,184,95,.25);
padding:16px;
border-radius:14px;
display:flex;
align-items:center;
gap:12px;
font-size:15px;
cursor:pointer;
position:relative;
}

.box::before{
content:"";
position:absolute;
left:0;
top:0;
bottom:0;
width:3px;
background:linear-gradient(var(--rf-gold),transparent);
border-radius:3px;
opacity:.6;
}

/* DOTS */

.dot{
width:10px;
height:10px;
border-radius:50%;
}

.origem{background:#22c55e;}
.parada{background:#3b82f6;}
.destino{background:#ef4444;}

/* PLUS */

.plus{
width:40px;
height:40px;
border-radius:50%;
background:linear-gradient(135deg,var(--rf-gold),var(--rf-gold-strong));
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:800;
margin:auto;
cursor:pointer;
box-shadow:0 0 14px rgba(214,184,95,.6);
}

/* OPTIONS */

.options{
display:none;
flex-direction:column;
gap:10px;
}

.option{
padding:12px;
border-radius:12px;
background:#12192A;
border:1px solid rgba(255,255,255,.08);
text-align:center;
cursor:pointer;
font-size:14px;
}

.option.active{
border-color:var(--rf-gold);
background:rgba(214,184,95,.2);
}

/* MULTI */

.multi{
display:flex;
gap:10px;
}

/* PRICE */

.price{
display:none;
padding:16px;
border-radius:16px;
background:rgba(214,184,95,.18);
text-align:center;
border:1px solid rgba(214,184,95,.3);
}

.price strong{
font-size:22px;
color:var(--rf-gold-strong);
}

/* BUTTON */

button{
padding:18px;
border-radius:50px;
border:none;
background:linear-gradient(135deg,var(--rf-gold),var(--rf-gold-strong));
font-weight:900;
font-size:16px;
cursor:pointer;
letter-spacing:.5px;
box-shadow:0 10px 30px rgba(214,184,95,.35);
}

button:disabled{
opacity:.35;
}

/* MODAL */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:#0E1320;
width:90%;
max-width:380px;
border-radius:16px;
padding:20px;
max-height:80vh;
overflow:auto;
}

.modal-content div{
padding:12px;
border-radius:10px;
cursor:pointer;
}

.modal-content div:hover{
background:rgba(255,255,255,.08);
}

</style>
</head>

<body>

<div id="map"></div>

<button class="loc-btn" onclick="centralizarUsuario()">📍</button>

<div class="header">
<div class="logo">RF</div>
<div class="status">Passageiro</div>
</div>

<div class="hero">
Para onde vamos hoje?
</div>

<div class="hero-visual">

<div class="hero-slide active">
<img src="img/slide1.jpg">
</div>

<div class="hero-slide">
<img src="img/slide2.jpg">
</div>

<div class="hero-slide">
<img src="img/slide3.jpg">
</div>

<div class="slider-dots">
<span class="dot-ind active"></span>
<span class="dot-ind"></span>
<span class="dot-ind"></span>
</div>

</div>

<div class="panel">

<div class="panel-inner">

<div class="box" id="origemBtn">
<div class="dot origem"></div>
<div id="origemTexto">Selecionar origem</div>
</div>

<div class="plus" id="plusBtn" style="display:none">+</div>

<div class="box" id="paradaBtn" style="display:none">
<div class="dot parada"></div>
<div id="paradaTexto">Selecionar parada</div>
</div>

<div class="box" id="destinoBtn" style="display:none">
<div class="dot destino"></div>
<div id="destinoTexto">Selecionar destino</div>
</div>

<div class="options" id="optionsBox">

<div class="option" id="desvioBtn">
Desvio simples (+R$5)
</div>

<div class="option" id="mercadoBtn">
🛒 Saída mercado (+R$3,89)
</div>

<div class="multi">

<div class="option" id="carro6Btn">
🚐 6 lugares (+50%)
</div>

<div class="option" id="excessoBtn">
👥 Excesso (+50%)
</div>

</div>

</div>

<div class="price" id="precoBox">
Total estimado<br>
<strong id="precoValor">R$ 0,00</strong>
</div>

<button id="confirmar" disabled>
Buscar motorista
</button>

</div>
</div>

<div class="modal" id="modal">
<div class="modal-content" id="lista"></div>
</div>

<script>

/* MAPA */

let map
let marcadorUsuario
let motoristas=[]

function initMap(){

const centro={lat:-8.283,lng:-35.032}

map=new google.maps.Map(document.getElementById("map"),{
zoom:14,
center:centro,
mapTypeControl:false,
streetViewControl:false,
fullscreenControl:false
})

localizarUsuario()
simularMotoristas()

}

function localizarUsuario(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(pos=>{

const posicao={
lat:pos.coords.latitude,
lng:pos.coords.longitude
}

map.setCenter(posicao)

if(marcadorUsuario) marcadorUsuario.setMap(null)

marcadorUsuario=new google.maps.Marker({
position:posicao,
map:map,
icon:{url:"https://maps.google.com/mapfiles/ms/icons/blue-dot.png"}
})

})

}

}

function centralizarUsuario(){
if(marcadorUsuario){
map.setCenter(marcadorUsuario.getPosition())
}
}

function simularMotoristas(){

const pontos=[
{lat:-8.284,lng:-35.030},
{lat:-8.282,lng:-35.034},
{lat:-8.280,lng:-35.028},
{lat:-8.286,lng:-35.033}
]

pontos.forEach(p=>{

const m=new google.maps.Marker({
position:p,
map:map,
icon:{
url:"https://maps.google.com/mapfiles/kml/shapes/cabs.png",
scaledSize:new google.maps.Size(40,40)
}
})

motoristas.push(m)

})

}

window.initMap=initMap

</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA1cAOVDUPslp3eRQilh41tte_jqqzeY00&callback=initMap" async defer></script>

</body>
</html>
