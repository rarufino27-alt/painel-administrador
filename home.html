<!DOCTYPE html>

<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>RF – Viagem</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="core/datamanager.js"></script>

<style>

/* RESET */
body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:#fff;
}

/* HEADER */
.header{
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(255,255,255,.05);
}

.logo{
font-weight:bold;
font-size:18px;
color:#facc15;
}

.status{
background:#22c55e;
padding:4px 10px;
border-radius:20px;
font-size:12px;
}

/* CONTAINER */
.container{
padding:16px;
}

/* CARD */
.card{
background:#1c1c1c;
border-radius:16px;
padding:16px;
box-shadow:0 10px 30px rgba(0,0,0,.4);
margin-bottom:16px;
}

/* INPUT */
.input{
background:#2a2a2a;
padding:14px;
border-radius:12px;
margin-bottom:10px;
cursor:pointer;
}

/* COLORS */
.green{border-left:4px solid #22c55e;}
.yellow{border-left:4px solid #facc15;}
.red{border-left:4px solid #ef4444;}

/* ADD PARADA */
.add{
color:#facc15;
font-size:13px;
margin-bottom:10px;
cursor:pointer;
}

/* VEICULOS */
.veiculos{
display:flex;
gap:10px;
margin-top:10px;
}

.veiculo{
flex:1;
background:#2a2a2a;
padding:12px;
border-radius:12px;
text-align:center;
cursor:pointer;
border:1px solid transparent;
}

.veiculo.ativo{
border:1px solid #facc15;
}

/* CTA */
.cta{
position:fixed;
bottom:0;
left:0;
right:0;
background:#1c1c1c;
padding:16px;
display:flex;
justify-content:space-between;
align-items:center;
border-top:1px solid #333;
}

.btn{
background:linear-gradient(90deg,#facc15,#eab308);
color:#000;
padding:14px 18px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">
  <div class="logo">RF MOTORISTA</div>
  <div class="status">ATIVO</div>
</div>

<div class="container">

<!-- CARD PRINCIPAL -->

<div class="card">

  <div class="input green" id="origemBtn">
    <div id="origemTexto">Selecionar origem</div>
  </div>

  <div class="add" id="addParada">+ Adicionar parada</div>

  <div class="input yellow" id="paradaBtn" style="display:none">
    <div id="paradaTexto">Selecionar parada</div>
  </div>

  <div class="input red" id="destinoBtn">
    <div id="destinoTexto">Selecionar destino</div>
  </div>

  <!-- VEICULOS -->

  <div class="veiculos">
    <div class="veiculo ativo" data-value="1">🚗<br>4 Lugares</div>
    <div class="veiculo" data-value="1.5">🚐<br>6 Lugares</div>
  </div>

</div>

</div>

<!-- CTA FIXO -->

<div class="cta">
  <div>
    <div style="font-size:12px;color:#aaa;">Total</div>
    <strong id="previewTotal">R$ 0,00</strong>
  </div>

  <button class="btn" id="btnContinuar">
    Calcular
  </button>
</div>

</body>
</html>
