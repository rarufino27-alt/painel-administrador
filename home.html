<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>RF Passageiro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

html,body{
margin:0;
padding:0;
height:100%;
font-family:Arial;
}

#map{
height:100%;
width:100%;
}

.top-ui{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
width:90%;
max-width:420px;
z-index:5;
}

.search-box{
background:white;
border-radius:12px;
padding:12px;
margin-bottom:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.25);
}

.search-box input{
width:100%;
border:none;
outline:none;
font-size:15px;
}

.result-card{
position:absolute;
bottom:0;
width:100%;
background:white;
padding:20px;
border-radius:20px 20px 0 0;
box-shadow:0 -5px 20px rgba(0,0,0,0.25);
z-index:5;
}

.result-card h3{
margin:0;
font-size:18px;
}

.result-card p{
margin:4px 0;
color:#555;
}

.result-card strong{
font-size:22px;
}

</style>
</head>

<body>

<div id="map"></div>

<div class="top-ui">

<div class="search-box">
<input id="destino" placeholder="Para onde vamos?">
</div>

<div class="search-box">
<input id="parada" placeholder="Adicionar parada (opcional)">
</div>

</div>

<div class="result-card">

<h3>Resumo da corrida</h3>

<p id="distancia">Distância: --</p>
<p id="tempo">Tempo estimado: --</p>
<p>Valor estimado:</p>

<strong id="valor">R$ --</strong>

</div>

<script>

let map
let directionsService
let directionsRenderer

let origem

const KM_VALOR = 1.8
const TEMPO_VALOR = 0.10
const TARIFA_MINIMA = 10

function initMap(){

map=new google.maps.Map(document.getElementById("map"),{
zoom:14,
center:{lat:-8.283,lng:-35.032},
mapTypeControl:false,
streetViewControl:false,
fullscreenControl:false
})

directionsService=new google.maps.DirectionsService()
directionsRenderer=new google.maps.DirectionsRenderer({
map:map,
suppressMarkers:false
})

obterLocalizacao()

configurarAutocomplete()

}

function obterLocalizacao(){

navigator.geolocation.getCurrentPosition(pos=>{

origem={
lat:pos.coords.latitude,
lng:pos.coords.longitude
}

map.setCenter(origem)

new google.maps.Marker({
position:origem,
map:map,
title:"Você"
})

})

}

function configurarAutocomplete(){

const inputDestino=document.getElementById("destino")
const inputParada=document.getElementById("parada")

const autocompleteDestino=new google.maps.places.Autocomplete(inputDestino)
const autocompleteParada=new google.maps.places.Autocomplete(inputParada)

autocompleteDestino.addListener("place_changed",()=>{

const destino=autocompleteDestino.getPlace()

if(!destino.geometry) return

const parada=inputParada.value

if(parada===""){

calcularRota(origem,destino.geometry.location)

}else{

const paradaPlace=autocompleteParada.getPlace()

if(paradaPlace.geometry){

calcularRotaComParada(
origem,
paradaPlace.geometry.location,
destino.geometry.location
)

}

}

})

}

function calcularRota(origem,destino){

directionsService.route({

origin:origem,
destination:destino,
travelMode:"DRIVING"

},(result,status)=>{

if(status==="OK"){

directionsRenderer.setDirections(result)

const rota=result.routes[0].legs[0]

atualizarResumo(rota.distance.value,rota.duration.value)

}

})

}

function calcularRotaComParada(origem,parada,destino){

directionsService.route({

origin:origem,
destination:destino,
waypoints:[{location:parada}],
travelMode:"DRIVING"

},(result,status)=>{

if(status==="OK"){

directionsRenderer.setDirections(result)

let distanciaTotal=0
let tempoTotal=0

result.routes[0].legs.forEach(leg=>{
distanciaTotal+=leg.distance.value
tempoTotal+=leg.duration.value
})

atualizarResumo(distanciaTotal,tempoTotal)

}

})

}

function atualizarResumo(distancia,tempo){

const km=(distancia/1000).toFixed(2)
const minutos=Math.round(tempo/60)

document.getElementById("distancia").innerText="Distância: "+km+" km"
document.getElementById("tempo").innerText="Tempo estimado: "+minutos+" min"

let valor=(km*KM_VALOR)+(km*TEMPO_VALOR)

if(valor<TARIFA_MINIMA){
valor=TARIFA_MINIMA
}

document.getElementById("valor").innerText="R$ "+valor.toFixed(2)

}

window.initMap=initMap

</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA1cAOVDUPslp3eRQilh41tte_jqqzeY00&libraries=places&callback=initMap" async defer></script>

</body>
</html>
